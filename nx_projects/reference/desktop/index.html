<body>

<!-- display:contents so .app + #menu-pop lay out as direct body children (same as flat HTML) -->
<div id="reference-mount" style="display:contents"></div>

<script>
  /** Load order must preserve opening/closing tags across fragments (see nx_time/reference/index.html). */
  const PARTIAL_FILES = [
    'partials/shell-app-open.html',
    'partials/shell-topbar.html',
    'partials/shell-body-slot-open.html',
    'partials/view-planner-open.html',
    'partials/shell-body-left-open.html',
    'partials/pane-backlog-priority.html',
    'partials/pane-backlog-projects.html',
    'partials/shell-left-close.html',
    'partials/panel-sprint-cart.html',
    'partials/view-planner-close.html',
    'partials/view-sprint-open.html',
    'partials/panel-sprint-cart-left.html',
    'partials/panel-sprint-days.html',
    'partials/view-sprint-close.html',
    'partials/view-sprint-day.html',
    'partials/view-today.html',
    'partials/shell-body-slot-close.html',
    'partials/shell-body-app-close.html',
    'partials/menu-row-context.html',
    'partials/modal-task-create.html',
    'partials/modal-project-create.html',
    'partials/view-task.html',
  ];

  async function loadPartials() {
    const root = document.getElementById('reference-mount');
    const chunks = await Promise.all(
      PARTIAL_FILES.map((path) =>
        fetch(path).then((r) => {
          if (!r.ok) throw new Error(path + ' HTTP ' + r.status);
          return r.text();
        })
      )
    );
    root.innerHTML = chunks.join('');
  }

  async function boot() {
    await loadPartials();

  const today = new Date(2026, 3, 23);
  const DAILY_CAP = 5;

  const sprints = [
    {
      id: 13, name: 'Sprint 13', badge: 'done', badgeText: 'done',
      dates: 'Apr 13 – Apr 19 · closed', capH: 24,
      goal: 'Shipped auth rewrite, started UI polish work.',
      start: new Date(2026, 3, 13), len: 7,
      day_notes: {
        1: 'Lost most of the afternoon to a cert rotation.',
        4: 'Good flow day — CSV export came together fast.',
        5: 'Push plumbing took longer than expected; APNs sandbox gremlins.',
      },
      retro_note: 'Auth rewrite landed cleanly. Pipeline work underestimated — both ingest items ran over. Need to pad estimates when SRE is involved.',
      items: [
        { id: 'a1', kind: 'feat', title: 'OAuth callback hardening', crumb: 'Nexus / Auth', est: 3, planned_day: 0, status: 'done', drift_from: [] },
        { id: 'a2', kind: 'bug',  title: 'Session refresh loop',     crumb: 'Nexus / Auth', est: 2, planned_day: 1, status: 'done', drift_from: [] },
        { id: 'a3', kind: 'feat', title: 'List virtual scroll',      crumb: 'Nexus / UI Polish', est: 4, planned_day: 2, status: 'done', drift_from: [1] },
        { id: 'a5', kind: 'bug',  title: 'Timezone in reports',      crumb: 'Pipeline', est: 2, planned_day: 3, status: 'done', drift_from: [] },
        { id: 'a4', kind: 'feat', title: 'CSV export',               crumb: 'Pipeline', est: 5, planned_day: 4, status: 'done', drift_from: [] },
        { id: 'a6', kind: 'feat', title: 'Push notification plumbing', crumb: 'Mobile App', est: 4, planned_day: 5, status: 'done', drift_from: [4] },
      ],
      actions: [],
    },
    {
      id: 14, name: 'Sprint 14', badge: 'active', badgeText: 'active',
      dates: 'Apr 20 – Apr 26 · 4 days left', capH: 40,
      goal: 'Ship dark mode + unblock the pipeline OOM.',
      start: new Date(2026, 3, 20), len: 7,
      day_notes: {
        0: 'Strong morning, tokens landed before lunch.',
        1: 'Toggle took longer — hover + a11y states ate the afternoon.',
        2: 'Partitioned ingest slipped a day; SRE review not ready.',
      },
      retro_note: '',
      items: [
        { id: 't1', kind: 'feat', title: 'Design tokens',       crumb: 'Nexus / UI Polish', est: 2, planned_day: 0, status: 'done',    drift_from: [] },
        { id: 't2', kind: 'feat', title: 'Toggle component',    crumb: 'Nexus / UI Polish', est: 4, planned_day: 1, status: 'done',    drift_from: [] },
        { id: 't3', kind: 'bug',  title: 'Flash of wrong theme',crumb: 'Nexus / UI Polish', est: 1, planned_day: 2, status: 'done',    drift_from: [] },
        { id: 't4', kind: 'feat', title: 'Partitioned ingest',  crumb: 'Pipeline',          est: 6, planned_day: 3, status: 'doing',   drift_from: [2] },
        { id: 't5', kind: 'bug',  title: 'OOM on large batch',  crumb: 'Pipeline',          est: 3, planned_day: 4, status: 'todo',    drift_from: [] },
        { id: 't6', kind: 'feat', title: 'Auth refactor cleanup', crumb: 'Nexus / Auth',    est: 4, planned_day: 5, status: 'blocked', drift_from: [], blocker: 'Waiting on SRE review of migration plan.' },
        { id: 't7', kind: 'feat', title: 'Schema drift alerts', crumb: 'Pipeline',          est: 5, planned_day: 6, status: 'todo',    drift_from: [] },
        { id: 't8', kind: 'feat', title: 'Mobile deep links',   crumb: 'Mobile App',        est: 3, planned_day: 5, status: 'todo',    drift_from: [3] },
        { id: 't9', kind: 'bug',  title: 'iOS splash flicker',  crumb: 'Mobile App',        est: 2, planned_day: 4, status: 'doing',   drift_from: [2, 3] },
      ],
      actions: [],
    },
    {
      id: 15, name: 'Sprint 15', badge: 'planned', badgeText: 'planned',
      dates: 'Apr 27 – May 2 · starts in 4 days', capH: 40,
      goal: '',
      start: new Date(2026, 3, 27), len: 6,
      day_notes: {},
      retro_note: '',
      items: [
        { id: 'n1', kind: 'feat', title: 'Onboarding checklist',    crumb: 'Nexus / UI Polish', est: 3, planned_day: 0,    status: 'todo', drift_from: [] },
        { id: 'n2', kind: 'feat', title: 'Retry dead-letter queue', crumb: 'Pipeline',          est: 4, planned_day: 1,    status: 'todo', drift_from: [] },
        { id: 'n3', kind: 'bug',  title: 'Android back stack',      crumb: 'Mobile App',        est: 2, planned_day: null, status: 'todo', drift_from: [] },
        { id: 'n4', kind: 'feat', title: 'Metrics dashboard v1',    crumb: 'Pipeline',          est: 6, planned_day: null, status: 'todo', drift_from: [] },
        { id: 'n5', kind: 'feat', title: 'Widget refresh',          crumb: 'Mobile App',        est: 3, planned_day: 3,    status: 'todo', drift_from: [] },
      ],
      actions: [],
    },
  ];

  function ensureActions(sp) {
    if (!Array.isArray(sp.actions)) sp.actions = [];
  }

  function pushWorkAction(sp, dayIdx, taskId, hours, workDescription) {
    ensureActions(sp);
    const slotH = [9, 11, 14, 16];
    const si = pushWorkAction._slot = (pushWorkAction._slot || 0);
    pushWorkAction._slot = si + 1;
    const t0 = new Date(sp.start);
    t0.setDate(t0.getDate() + dayIdx);
    t0.setHours(slotH[si % slotH.length], (si % 3) * 10, 0, 0);
    const t1 = new Date(t0.getTime() + hours * 3600000);
    const start = t0.toISOString();
    const end = t1.toISOString();
    sp.actions.push({
      id: 'w-' + sp.id + '-' + taskId + '-d' + dayIdx + '-' + si,
      type: 'Work',
      start,
      end,
      tasks: [{
        task_id: taskId,
        work_description: workDescription,
        time_spent_hours: hours,
        started_at: start,
        finished_at: end,
        marked_done: false,
      }],
    });
  }

  (function seedFixtureWorkActions() {
    pushWorkAction._slot = 0;
    const s13 = sprints[0];
    pushWorkAction(s13, 0, 'a1', 3.25, '');
    pushWorkAction(s13, 1, 'a2', 1.5, '');
    pushWorkAction(s13, 2, 'a3', 6.5, '');
    pushWorkAction(s13, 3, 'a5', 2, '');
    pushWorkAction(s13, 4, 'a4', 4, '');
    pushWorkAction(s13, 5, 'a6', 5, '');
    pushWorkAction._slot = 0;
    const s14 = sprints[1];
    pushWorkAction(s14, 0, 't1', 2.5, 'Tokens: palette + CSS vars');
    pushWorkAction(s14, 1, 't2', 5, 'Toggle: hover + a11y states');
    pushWorkAction(s14, 2, 't3', 1.5, '');
    pushWorkAction(s14, 2, 't4', 2, 'Ingest partitioning');
    pushWorkAction(s14, 2, 't9', 2, 'Splash flicker — partial');
    pushWorkAction(s14, 3, 't9', 2, 'Splash flicker — continued');
  })();

  let cur = 1;

  const viewPlanner = document.getElementById('view-planner');
  const viewSprint = document.getElementById('view-sprint');
  const viewSprintDay = document.getElementById('view-sprint-day');
  const viewToday = document.getElementById('view-today');

  function setView(name) {
    if (name !== 'sprint-day') {
      openDay = null;
      openDaySprintIdx = null;
    }
    if (name !== 'today') todayBrowseDate = null;
    viewPlanner.hidden = name !== 'planner';
    viewSprint.hidden = name !== 'sprint';
    if (viewSprintDay) viewSprintDay.hidden = name !== 'sprint-day';
    viewToday.hidden = name !== 'today';
    const tabName = name === 'sprint-day' ? 'sprint' : name;
    document.querySelectorAll('[data-view]').forEach(btn => {
      const on = btn.dataset.view === tabName;
      btn.classList.toggle('active', on);
      btn.classList.toggle('muted', !on);
    });
    renderAll();
  }

  document.querySelectorAll('[data-view]').forEach(btn => {
    btn.addEventListener('click', () => setView(btn.dataset.view));
  });
  document.querySelectorAll('[data-goto-view]').forEach(btn => {
    btn.addEventListener('click', () => setView(btn.dataset.gotoView));
  });

  // pane toggle
  const tabP = document.getElementById('tab-priority');
  const tabJ = document.getElementById('tab-projects');
  const paneP = document.getElementById('pane-priority');
  const paneJ = document.getElementById('pane-projects');
  function showPane(p) {
    tabP.classList.toggle('active', p);
    tabJ.classList.toggle('active', !p);
    paneP.classList.toggle('hidden', !p);
    paneJ.classList.toggle('hidden', p);
  }
  tabP.addEventListener('click', () => showPane(true));
  tabJ.addEventListener('click', () => showPane(false));

  function sprint() { return sprints[cur]; }
  function items() { return sprint().items; }

  const DOW = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const MON = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  function dayDate(idx) {
    const d = new Date(sprint().start);
    d.setDate(d.getDate() + idx);
    return d;
  }
  function sameDay(a, b) {
    return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
  }

  function actionStartDate(a) {
    return new Date(a.start);
  }
  function actionDayIndex(sp, a) {
    return dayIndexInSprint(sp, actionStartDate(a));
  }
  function actionsOnDay(sp, d) {
    ensureActions(sp);
    return sp.actions.filter(a => actionDayIndex(sp, a) === d)
      .sort((x, y) => actionStartDate(x) - actionStartDate(y));
  }
  function runningAction(sp) {
    ensureActions(sp);
    for (let i = sp.actions.length - 1; i >= 0; i--) {
      if (sp.actions[i].end == null) return sp.actions[i];
    }
    return null;
  }
  function taskEntriesForTaskOnDay(sp, item, d) {
    const out = [];
    actionsOnDay(sp, d).forEach(a => {
      (a.tasks || []).forEach((t, entryIndex) => {
        if (t.task_id === item.id) out.push({ action: a, entry: t, entryIndex });
      });
    });
    return out;
  }
  function hoursForTaskOnDay(sp, item, d) {
    return taskEntriesForTaskOnDay(sp, item, d).reduce((sum, { entry }) =>
      sum + (Number(entry.time_spent_hours) || 0), 0);
  }
  function descriptionsForTaskOnDay(sp, item, d) {
    const parts = [];
    taskEntriesForTaskOnDay(sp, item, d).forEach(({ entry }) => {
      const w = (entry.work_description || '').trim();
      if (w) parts.push(w);
    });
    return parts.join(' · ');
  }
  function itemActual(sp, i) {
    ensureActions(sp);
    let sum = 0;
    sp.actions.forEach(a => {
      (a.tasks || []).forEach(t => {
        if (t.task_id === i.id) sum += Number(t.time_spent_hours) || 0;
      });
    });
    return sum;
  }
  function cumulativeActualUpTo(sp, i, d) {
    let sum = 0;
    for (let di = 0; di <= d; di++) sum += hoursForTaskOnDay(sp, i, di);
    return sum;
  }
  function dayActualFor(sp, i, d) {
    return hoursForTaskOnDay(sp, i, d);
  }

  function dayTitle(s, d) {
    const n = s.day_notes && s.day_notes[d];
    return typeof n === 'string' ? n : (n && n.title) || '';
  }
  function dayBody(s, d) {
    const n = s.day_notes && s.day_notes[d];
    return typeof n === 'string' ? '' : (n && n.body) || '';
  }
  function setDayField(s, d, field, value) {
    s.day_notes = s.day_notes || {};
    const cur = s.day_notes[d];
    const obj = typeof cur === 'string' ? { title: cur, body: '' } : (cur || { title: '', body: '' });
    obj[field] = value;
    s.day_notes[d] = obj;
  }
  function dayIndexInSprint(sp, date) {
    const start = new Date(sp.start);
    start.setHours(0, 0, 0, 0);
    const t = new Date(date);
    t.setHours(0, 0, 0, 0);
    const diff = Math.round((t - start) / 86400000);
    if (diff < 0 || diff >= sp.len) return null;
    return diff;
  }
  function sprintIdxContainingToday() {
    for (let i = 0; i < sprints.length; i++) {
      if (dayIndexInSprint(sprints[i], today) != null) return i;
    }
    return null;
  }

  function calendarDateAtMidnight(d) {
    const t = new Date(d);
    t.setHours(0, 0, 0, 0);
    return t;
  }
  function locateCalendarDateInPlan(dt) {
    const t = calendarDateAtMidnight(dt);
    for (let i = 0; i < sprints.length; i++) {
      const dIdx = dayIndexInSprint(sprints[i], t);
      if (dIdx != null) return { si: i, d: dIdx, sp: sprints[i] };
    }
    return null;
  }
  function totalPlanDays() {
    return sprints.reduce((sum, sp) => sum + sp.len, 0);
  }
  function flatDayIndex(si, d) {
    let sum = 0;
    for (let i = 0; i < si; i++) sum += sprints[i].len;
    return sum + d;
  }
  function fromFlatDayIndex(flat) {
    const T = totalPlanDays();
    if (T === 0 || sprints.length === 0) return { si: 0, d: 0 };
    let f = flat % T;
    if (f < 0) f += T;
    for (let i = 0; i < sprints.length; i++) {
      const L = sprints[i].len;
      if (f < L) return { si: i, d: f };
      f -= L;
    }
    return { si: sprints.length - 1, d: Math.max(0, sprints[sprints.length - 1].len - 1) };
  }
  function globalDayNav(si, d, delta) {
    return fromFlatDayIndex(flatDayIndex(si, d) + delta);
  }

  let openDay = null;
  let openDaySprintIdx = null;
  let todayBrowseDate = null;
  let pendingTaskPlannedDay = null;
  function openDayDetail(d) {
    openDaySprintIdx = cur;
    openDay = d;
    setView('sprint-day');
  }
  function closeDayDetail() {
    openDay = null;
    setView('sprint');
  }

  function dayTaskEntries(sp, list, d) {
    const seen = new Set();
    const out = [];
    function add(item, ghost) {
      if (seen.has(item.id)) return;
      seen.add(item.id);
      out.push({ item, ghost });
    }
    list.forEach(i => { if (i.planned_day === d) add(i, false); });
    list.forEach(i => {
      if ((i.drift_from || []).includes(d) && i.planned_day !== d) add(i, true);
    });
    list.forEach(i => {
      const had = hoursForTaskOnDay(sp, i, d) > 0;
      if (had && i.planned_day !== d && !(i.drift_from || []).includes(d)) add(i, true);
    });
    return out;
  }

  function escapeHtml(s) {
    return String(s || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function formatRunSeconds(sec) {
    if (sec < 3600) {
      const m = Math.floor(sec / 60);
      const s = Math.floor(sec % 60);
      return m + ':' + String(s).padStart(2, '0');
    }
    const h = Math.floor(sec / 3600);
    const m = Math.floor((sec % 3600) / 60);
    const s = Math.floor(sec % 60);
    return h + ':' + String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
  }

  let __runTimer = null;
  function refreshRunningElapsedLabels() {
    document.querySelectorAll('[data-running-elapsed]').forEach(el => {
      const start = parseInt(el.dataset.runningStarted, 10);
      if (Number.isNaN(start)) return;
      el.textContent = formatRunSeconds((Date.now() - start) / 1000);
    });
  }
  function startRunTimerIfNeeded() {
    if (__runTimer) return;
    refreshRunningElapsedLabels();
    __runTimer = setInterval(refreshRunningElapsedLabels, 1000);
  }
  function stopRunTimer() {
    if (__runTimer) {
      clearInterval(__runTimer);
      __runTimer = null;
    }
  }

  function crumbFromProjectSelect(val) {
    switch (val) {
      case 'nexus': return 'Nexus / Web';
      case 'nexus/ui-polish': return 'Nexus / UI Polish';
      case 'nexus/auth-rewrite': return 'Nexus / Auth';
      case 'pipeline': return 'Pipeline';
      case 'mobile': return 'Mobile App';
      default: return 'Nexus / UI Polish';
    }
  }

  function renderTodayEmptyState() {
    const host = document.getElementById('view-today');
    if (!host) return;
    const si = sprintIdxContainingToday();
    const sp = si != null ? sprints[si] : null;
    const label = `${MON[today.getMonth()]} ${today.getDate()}`;
    host.innerHTML = `<div class="dd-empty">`
      + `<p>Today (${label}) is not on any sprint in this mock.</p>`
      + (sp
          ? `<button type="button" class="btn-primary dd-jump-sprint" data-sprint-idx="${si}">Open ${sp.name}</button>`
          : `<p class="dd-empty-sub">No sprint in this mock contains today.</p>`)
      + `</div>`;
    host.querySelector('.dd-jump-sprint')?.addEventListener('click', e => {
      const btn = e.target.closest('.dd-jump-sprint');
      if (!btn) return;
      cur = parseInt(btn.dataset.sprintIdx, 10);
      renderAll();
    });
  }

  function renderTodayGapPage(dt) {
    const host = document.getElementById('view-today');
    if (!host) return;
    const t = calendarDateAtMidnight(dt);
    const dow = t.getDay();
    const isToday = sameDay(t, today);
    const label = `${DOW[dow]} ${MON[t.getMonth()]} ${t.getDate()}` + (isToday ? ' · today' : '');
    const siToday = sprintIdxContainingToday();
    const spToday = siToday != null ? sprints[siToday] : null;
    host.innerHTML = `<div class="day-page">`
      + '<div class="dd-head">'
      + '<div class="dd-day-nav">'
      + '<button type="button" class="dd-day-arrow" data-today-nav="-1" title="Previous day">&lsaquo;</button>'
      + '<button type="button" class="dd-day-arrow" data-today-nav="1" title="Next day">&rsaquo;</button>'
      + '</div>'
      + `<span class="dd-date">${label} <span class="dd-pill" data-pill="off-plan">off plan</span></span>`
      + '</div>'
      + '<div class="dd-gap-body">'
      + '<p class="dd-gap-msg">No sprint includes this calendar day in the mock data.</p>'
      + (sameDay(t, today) && spToday
          ? `<button type="button" class="btn-primary dd-jump-sprint" data-sprint-idx="${siToday}">Open ${escapeHtml(spToday.name)} (contains today)</button>`
          : '')
      + '</div>'
      + '</div>';
    host.querySelectorAll('[data-today-nav]').forEach(btn => {
      btn.addEventListener('click', e => {
        const delta = parseInt(e.currentTarget.dataset.todayNav, 10);
        if (Number.isNaN(delta)) return;
        const next = new Date(todayBrowseDate || t);
        next.setDate(next.getDate() + delta);
        todayBrowseDate = calendarDateAtMidnight(next);
        renderAll();
      });
    });
    host.querySelector('.dd-jump-sprint')?.addEventListener('click', e => {
      const btn = e.target.closest('.dd-jump-sprint');
      if (!btn) return;
      cur = parseInt(btn.dataset.sprintIdx, 10);
      setView('sprint');
    });
  }

  function renderDayPage(s, d, mode, sprintIdx) {
    const host = mode === 'sprint'
      ? document.getElementById('view-sprint-day')
      : document.getElementById('view-today');
    if (!host) return;
    const list = s.items;
    const n = s.len;
    const isDoneSprint = s.badge === 'done';
    const isPlannedSprint = s.badge === 'planned';
    const dt = new Date(s.start);
    dt.setDate(dt.getDate() + d);
    const dow = dt.getDay();
    const isToday = sameDay(dt, today);
    const isPast = dt < today && !isToday;
    const isFuture = dt > today && !isToday;
    const dayLabel = isToday ? 'today' : (isPast ? 'past' : 'future');
    const hasHistory = (isPast || isToday) && !isPlannedSprint;

    const dayItems = list.filter(i => i.planned_day === d);
    const planned = dayItems.reduce((a, i) => a + i.est, 0);
    const actual = list.reduce((a, i) => a + dayActualFor(s, i, d), 0);
    const doneCount = dayItems.filter(i => i.status === 'done').length;
    const pushedOut = list.filter(i =>
      (i.drift_from || []).includes(d) && i.planned_day !== d).length;
    const rolledIn = list.filter(i =>
      i.planned_day === d && (i.drift_from || []).length > 0).length;
    const actualCls = varianceCls(actual, planned);

    let headHtml = '<div class="dd-head">';
    if (mode === 'sprint' && sprintIdx != null && totalPlanDays() > 0) {
      const prevG = globalDayNav(sprintIdx, d, -1);
      const nextG = globalDayNav(sprintIdx, d, 1);
      headHtml += '<button type="button" class="dd-back" title="Back to Sprint">&larr; Sprint</button>'
        + '<div class="dd-day-nav">'
        + `<button type="button" class="dd-day-arrow" data-dd-nav-si="${prevG.si}" data-dd-nav-d="${prevG.d}" title="Previous day">&lsaquo;</button>`
        + `<button type="button" class="dd-day-arrow" data-dd-nav-si="${nextG.si}" data-dd-nav-d="${nextG.d}" title="Next day">&rsaquo;</button>`
        + '</div>';
    }
    if (mode === 'today') {
      headHtml += '<div class="dd-day-nav">'
        + '<button type="button" class="dd-day-arrow" data-today-nav="-1" title="Previous day">&lsaquo;</button>'
        + '<button type="button" class="dd-day-arrow" data-today-nav="1" title="Next day">&rsaquo;</button>'
        + '</div>';
    }
    headHtml += `<span class="dd-date">${DOW[dow]} ${MON[dt.getMonth()]} ${dt.getDate()}`
      + (isToday ? ' · today' : '') + ` <span class="dd-pill" data-pill="${dayLabel}">${dayLabel}</span></span>`
      + `<input type="text" class="dd-title" placeholder="Short title for this day…" value="${dayTitle(s, d).replace(/"/g, '&quot;')}" data-dd-field="title" />`
      + '</div>';

    let statsHtml = '';
    if (hasHistory && dayItems.length > 0) {
      const doneCls = doneCount === dayItems.length ? '' : 'incomplete';
      statsHtml = '<div class="dd-stats">'
        + `<span class="stat done ${doneCls}">✓ <b>${doneCount}/${dayItems.length}</b> done</span>`
        + `<span class="stat"><b>${planned}h</b> planned / ${DAILY_CAP}h cap</span>`
        + (actual > 0 || doneCount > 0
            ? `<span class="stat day-hours-actual ${actualCls}"><b>${actual}h</b> actual</span>`
            : '')
        + (pushedOut > 0 ? `<span class="stat pushed">↗ <b>${pushedOut}</b> pushed out</span>` : '')
        + (rolledIn > 0 ? `<span class="stat rolled">↙ <b>${rolledIn}</b> rolled in</span>` : '')
        + '</div>';
    } else {
      statsHtml = '<div class="dd-stats">'
        + `<span class="stat"><b>${planned}h</b> planned / ${DAILY_CAP}h cap</span>`
        + (actual > 0 ? `<span class="stat day-hours-actual ${actualCls}"><b>${actual}h</b> actual</span>` : '')
        + '</div>';
    }

    const barInner = planned > 0
      ? progVarianceSegments(planned, actual, 'todo')
      : '';
    const barHtml = `<div class="dd-bar">${barInner}</div>`;

    const ra = runningAction(s);
    let actionsHtml = '<div class="actions-zone"><div class="actions-zone-head">'
      + '<h3 class="actions-title">Actions</h3>'
      + `<button type="button" class="btn-secondary btn-start-work" data-start-work${ra ? ' disabled' : ''}>+ Start Work</button>`
      + '</div>';

    const pastOnDay = actionsOnDay(s, d).filter(a => a.end != null);
    pastOnDay.forEach(a => {
      const dur = hoursBetweenIso(a.start, a.end);
      const sumSpent = (a.tasks || []).reduce((x, t) => x + (Number(t.time_spent_hours) || 0), 0);
      const warn = sumSpent > dur + 1e-6;
      actionsHtml += `<div class="action-card" data-action-id="${a.id}">`
        + '<div class="action-head">'
        + `<span>Work · ${fmtClock(a.start)} → ${fmtClock(a.end)} · ${dur.toFixed(1)}h</span>`
        + '<div class="action-head-btns">'
        + `<button type="button" class="btn-ghost-sm" data-action-toggle-edit="${a.id}">Edit</button>`
        + `<button type="button" class="btn-ghost-sm" data-action-delete="${a.id}">Delete</button>`
        + '</div></div>';
      if (warn) {
        actionsHtml += `<div class="action-warn">Logged ${sumSpent.toFixed(1)}h in entries vs ${dur.toFixed(1)}h window</div>`;
      }
      actionsHtml += `<div class="action-view-panel" data-action-view="${a.id}">`;
      (a.tasks || []).forEach((ent, ei) => {
        const item = list.find(it => it.id === ent.task_id);
        if (!item) return;
        const gch = item.kind === 'bug' ? '●' : '◉';
        actionsHtml += '<div class="action-entry">'
          + `<span class="g ${item.kind}">${gch}</span> ${escapeHtml(item.title)} · <b>${ent.time_spent_hours}h</b>`
          + `<div class="action-wd-read">${escapeHtml(ent.work_description)}</div>`
          + '</div>';
      });
      actionsHtml += `<button type="button" class="btn-ghost-sm action-add-inline" data-action-add-task="${a.id}">+ add task to this block</button>`
        + '</div>';
      actionsHtml += `<div class="action-edit-panel" data-action-edit="${a.id}">`;
      (a.tasks || []).forEach((ent, ei) => {
        const item = list.find(it => it.id === ent.task_id);
        if (!item) return;
        actionsHtml += '<div class="action-entry-edit">'
          + `<span class="ed-title">${escapeHtml(item.title)}</span>`
          + `<label class="ed-lbl">Hours <input type="number" step="0.25" min="0" data-edit-hours="${a.id}" data-entry-idx="${ei}" value="${ent.time_spent_hours}" /></label>`
          + `<textarea data-edit-wd="${a.id}" data-entry-idx="${ei}" placeholder="Work description">${escapeHtml(ent.work_description)}</textarea>`
          + `<button type="button" class="btn-ghost-sm" data-remove-entry="${a.id}" data-entry-idx="${ei}">Remove entry</button>`
          + '</div>';
      });
      actionsHtml += `<button type="button" class="btn-secondary" data-action-save-edit="${a.id}">Done editing</button>`
        + '</div></div>';
    });

    if (ra) {
      const startedMs = new Date(ra.start).getTime();
      actionsHtml += `<div class="action-card is-running" data-action-id="${ra.id}">`
        + '<div class="action-head">'
        + `<span>▶ Work · running <span class="action-run-elapsed" data-running-elapsed data-running-started="${startedMs}">${formatRunSeconds((Date.now() - startedMs) / 1000)}</span></span>`
        + `<span class="action-started">started ${fmtClock(ra.start)}</span>`
        + `<button type="button" class="btn-ghost-sm" data-action-stop="${ra.id}">Stop</button>`
        + '</div><div class="action-body-run">';
      (ra.tasks || []).forEach((ent, ei) => {
        if (!ent.finished_at) return;
        const item = list.find(it => it.id === ent.task_id);
        if (!item) return;
        const gch = item.kind === 'bug' ? '●' : '◉';
        actionsHtml += '<div class="action-entry-done">'
          + `<span class="g ${item.kind}">${gch}</span> <span>${escapeHtml(item.title)}</span>`
          + ` · <b>${ent.time_spent_hours}h</b>`
          + `<div class="action-wd-read">${escapeHtml(ent.work_description)}</div>`
          + '</div>';
      });
      const active = (ra.tasks || []).find(t => !t.finished_at);
      if (!active && (!ra.tasks || ra.tasks.length === 0)) {
        actionsHtml += '<div class="action-pick">'
          + `<label class="pick-lbl">First task</label><select class="action-task-select" data-pick-for="${ra.id}">${taskOptionsHtml(s, d)}</select>`
          + `<button type="button" class="btn-secondary" data-append-task="${ra.id}">Begin</button>`
          + '</div>';
      } else if (active) {
        const ai = list.find(it => it.id === active.task_id);
        const eidx = ra.tasks.indexOf(active);
        const gch = ai.kind === 'bug' ? '●' : '◉';
        actionsHtml += '<div class="action-task-active">'
          + `<span class="g ${ai.kind}">${gch}</span> <b>${escapeHtml(ai.title)}</b>`
          + `<textarea class="action-wd-input" data-active-wd data-action-id="${ra.id}" data-entry-idx="${eidx}" placeholder="What did you finish in this block?">${escapeHtml(active.work_description)}</textarea>`
          + `<label class="mark-done-lbl"><input type="checkbox" data-mark-done /> Mark task done when finishing</label>`
          + `<button type="button" class="btn-secondary" data-finish-entry="${ra.id}">Finish & add next task</button>`
          + '</div>';
      } else {
        actionsHtml += '<div class="action-pick">'
          + `<label class="pick-lbl">Next task</label><select class="action-task-select" data-pick-for="${ra.id}">${taskOptionsHtml(s, d)}</select>`
          + `<button type="button" class="btn-secondary" data-append-task="${ra.id}">Add task</button>`
          + '</div>';
      }
      actionsHtml += '</div></div>';
    }

    if (!ra && pastOnDay.length === 0) {
      actionsHtml += '<div class="actions-zone-empty">No actions logged for this day. Start one above.</div>';
    }
    actionsHtml += '</div>';

    const entries = dayTaskEntries(s, list, d);
    const raActive = ra ? (ra.tasks || []).find(t => !t.finished_at) : null;
    let tasksHtml = '<div class="dd-tasks"><div class="dd-tasks-section-title">Tasks this day</div>';
    if (entries.length === 0) {
      tasksHtml += '<div class="dd-tasks-empty">Nothing scheduled or logged on this day.</div>';
    }
    entries.forEach(({ item: i, ghost }) => {
      const g = i.kind === 'bug' ? '●' : '◉';
      const status = i.status || 'todo';
      const drift = (i.drift_from || []).length;
      const lastSrc = drift > 0 ? (i.drift_from || [])[i.drift_from.length - 1] : null;
      const fromBadge = drift > 0 && lastSrc != null && !ghost
          ? `<span class="from-day" title="Rolled in from ${fmtDay(lastSrc)}">↙ ${DOW[dayDate(lastSrc).getDay()]} ${dayDate(lastSrc).getDate()}</span>`
          : '';
      const onThisDay = i.planned_day === d;
      const movedTo = i.planned_day;
      const movedToLabel = movedTo == null
          ? 'unscheduled'
          : `${DOW[dayDate(movedTo).getDay()]} ${dayDate(movedTo).getDate()}`;
      const movedBadge = ghost
          ? `<span class="moved-to">→ ${movedToLabel}</span>`
          : '';
      const hToday = dayActualFor(s, i, d);
      const hTot = itemActual(s, i);
      const desc = descriptionsForTaskOnDay(s, i, d);
      const descLine = desc
        ? `<div class="dd-task-derived">${escapeHtml(desc)}</div>`
        : '<div class="dd-task-derived muted">(no work descriptions on actions for this day)</div>';
      const chips = ['todo', 'doing', 'done', 'blocked'].map(st =>
        `<button type="button" class="schip ${status === st ? 'active' : ''}" data-task-id="${i.id}" data-status="${st}">${st}</button>`
      ).join('');
      const canPush = onThisDay && !ghost && d + 1 < n;
      const canPull = ghost && i.planned_day !== d && ((i.drift_from || []).includes(d) || hoursForTaskOnDay(s, i, d) > 0);
      const activeHint = raActive && raActive.task_id === i.id
        ? '<span class="active-in-run">(active in current action)</span>'
        : '';
      tasksHtml += `<div class="dd-task ${ghost ? 'is-ghost' : ''}" data-task-id="${i.id}">`
        + '<div class="dd-task-top">'
        +   `<span class="status-dot ${status}" title="${status}"></span>`
        +   `<span class="g ${i.kind}">${g}</span>`
        +   '<div class="dd-task-main">'
        +     '<div class="dd-task-title-row">'
        +       `<span class="crumb-inline">${escapeHtml(i.crumb)}</span>${escapeHtml(i.title)}`
        +       (drift > 0 && !ghost ? `<span class="drift" title="Postponed ${drift}× · ${driftChain(i)}">↻${drift}</span>` : '')
        +       fromBadge + movedBadge + activeHint
        +       (i.blocker ? `<span class="blocker-dot" title="${escapeHtml(i.blocker)}"></span>` : '')
        +     '</div>'
        +     descLine
        +   '</div>'
        + '</div>'
        + `<div class="dd-hours-readonly"><b>${hToday}h</b> this day · <b>${hTot}h</b> total · est ${i.est}h</div>`
        + '<div class="dd-actions">'
        +   `<div class="status-chips">${chips}</div>`
        +   (canPush ? `<button type="button" class="btn-ghost-sm" data-task-push="${i.id}">Push &rarr;</button>` : '')
        +   (canPull ? `<button type="button" class="btn-ghost-sm" data-task-pull="${i.id}">Pull here</button>` : '')
        +   `<button type="button" class="btn-ghost-sm" data-task-block="${i.id}">${i.blocker ? 'Clear block' : 'Block…'}</button>`
        + '</div>'
        + '</div>';
    });
    tasksHtml += '</div>';

    const addHtml = `<div class="dd-add"><button type="button" class="btn-secondary" data-dd-add="${d}">+ Add task to this day</button></div>`;

    const bodyEsc = dayBody(s, d)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
    const journalHtml = '<div class="dd-journal">'
      + '<label class="dd-journal-label">Day journal</label>'
      + `<textarea class="dd-body" placeholder="Longer notes for this day…" data-dd-field="body">${bodyEsc}</textarea>`
      + '</div>';

    const innerHtml = '<div class="day-page">'
      + headHtml + statsHtml + barHtml
      + '<div class="day-page-cols">'
      + '<div class="day-page-left">' + tasksHtml + addHtml + journalHtml + '</div>'
      + '<aside class="day-page-right">' + actionsHtml + '</aside>'
      + '</div>'
      + '</div>';
    host.innerHTML = innerHtml;

    const bindRoot = host;
    bindRoot.querySelector('.dd-title')?.addEventListener('input', e => {
      setDayField(s, d, 'title', e.target.value);
    });
    bindRoot.querySelector('.dd-body')?.addEventListener('input', e => {
      setDayField(s, d, 'body', e.target.value);
    });

    bindRoot.querySelectorAll('.dd-back').forEach(btn => {
      btn.addEventListener('click', () => closeDayDetail());
    });
    bindRoot.querySelectorAll('[data-dd-nav-si]').forEach(btn => {
      btn.addEventListener('click', e => {
        const el = e.currentTarget;
        const si = parseInt(el.dataset.ddNavSi, 10);
        const dNav = parseInt(el.dataset.ddNavD, 10);
        if (Number.isNaN(si) || Number.isNaN(dNav)) return;
        if (si < 0 || si >= sprints.length) return;
        openDaySprintIdx = si;
        openDay = dNav;
        renderAll();
      });
    });
    bindRoot.querySelectorAll('[data-today-nav]').forEach(btn => {
      btn.addEventListener('click', e => {
        const delta = parseInt(e.currentTarget.dataset.todayNav, 10);
        if (Number.isNaN(delta)) return;
        const curCal = new Date(s.start);
        curCal.setDate(curCal.getDate() + d);
        curCal.setHours(0, 0, 0, 0);
        const next = new Date(curCal);
        next.setDate(next.getDate() + delta);
        todayBrowseDate = calendarDateAtMidnight(next);
        renderAll();
      });
    });

    bindRoot.querySelectorAll('[data-start-work]').forEach(btn => {
      btn.addEventListener('click', () => {
        if (btn.disabled || runningAction(s)) return;
        ensureActions(s);
        s.actions.push({
          id: 'a-' + Date.now().toString(36),
          type: 'Work',
          start: new Date().toISOString(),
          end: null,
          tasks: [],
        });
        renderAll();
      });
    });

    bindRoot.querySelectorAll('[data-action-stop]').forEach(btn => {
      btn.addEventListener('click', () => {
        const act = s.actions.find(x => x.id === btn.dataset.actionStop);
        if (!act || act.end != null) return;
        const last = (act.tasks || [])[(act.tasks || []).length - 1];
        if (last && !last.finished_at) {
          const now = new Date().toISOString();
          last.finished_at = now;
          last.time_spent_hours = hoursBetweenIso(last.started_at, now);
        }
        act.end = new Date().toISOString();
        renderAll();
      });
    });

    function appendTaskToRunningAction(act, taskId) {
      if (!taskId || act.end != null) return;
      const item = list.find(x => x.id === taskId);
      if (!item) return;
      const now = new Date().toISOString();
      act.tasks = act.tasks || [];
      act.tasks.push({
        task_id: taskId,
        work_description: '',
        time_spent_hours: 0,
        started_at: now,
        finished_at: null,
        marked_done: false,
      });
      if (item.status === 'todo') item.status = 'doing';
    }

    bindRoot.querySelectorAll('[data-append-task]').forEach(btn => {
      btn.addEventListener('click', () => {
        const act = s.actions.find(x => x.id === btn.dataset.appendTask);
        if (!act) return;
        const card = btn.closest('.action-card');
        const sel = card ? card.querySelector(`select[data-pick-for="${act.id}"]`) : null;
        const tid = sel && sel.value;
        appendTaskToRunningAction(act, tid);
        renderAll();
      });
    });

    bindRoot.querySelectorAll('[data-active-wd]').forEach(ta => {
      ta.addEventListener('change', () => {
        const act = s.actions.find(x => x.id === ta.dataset.actionId);
        const ei = parseInt(ta.dataset.entryIdx, 10);
        const ent = act && act.tasks && act.tasks[ei];
        if (ent) ent.work_description = ta.value;
      });
    });

    bindRoot.querySelectorAll('[data-finish-entry]').forEach(btn => {
      btn.addEventListener('click', () => {
        const act = s.actions.find(x => x.id === btn.dataset.finishEntry);
        if (!act || act.end != null) return;
        const active = (act.tasks || []).find(t => !t.finished_at);
        if (!active) return;
        const card = btn.closest('.action-card');
        const markDone = card && card.querySelector('[data-mark-done]')?.checked;
        const now = new Date().toISOString();
        active.finished_at = now;
        active.time_spent_hours = hoursBetweenIso(active.started_at, now);
        active.marked_done = !!markDone;
        const it = list.find(x => x.id === active.task_id);
        if (markDone && it) it.status = 'done';
        renderAll();
      });
    });

    bindRoot.querySelectorAll('[data-action-delete]').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = btn.dataset.actionDelete;
        if (!window.confirm('Delete this action?')) return;
        ensureActions(s);
        s.actions = s.actions.filter(x => x.id !== id);
        renderAll();
      });
    });

    bindRoot.querySelectorAll('[data-action-toggle-edit]').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = btn.dataset.actionToggleEdit;
        const card = btn.closest('.action-card');
        if (card) card.classList.toggle('is-editing');
      });
    });

    bindRoot.querySelectorAll('[data-action-save-edit]').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = btn.dataset.actionSaveEdit;
        const act = s.actions.find(x => x.id === id);
        if (!act) return;
        const card = btn.closest('.action-card');
        card.querySelectorAll('[data-edit-hours]').forEach(inp => {
          const ei = parseInt(inp.dataset.entryIdx, 10);
          const ent = act.tasks[ei];
          if (ent) ent.time_spent_hours = parseFloat(inp.value) || 0;
        });
        card.querySelectorAll('[data-edit-wd]').forEach(ta => {
          const ei = parseInt(ta.dataset.entryIdx, 10);
          const ent = act.tasks[ei];
          if (ent) ent.work_description = ta.value;
        });
        card.classList.remove('is-editing');
        renderAll();
      });
    });

    bindRoot.querySelectorAll('[data-remove-entry]').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = btn.dataset.removeEntry;
        const ei = parseInt(btn.dataset.entryIdx, 10);
        const act = s.actions.find(x => x.id === id);
        if (act && act.tasks) act.tasks.splice(ei, 1);
        renderAll();
      });
    });

    bindRoot.querySelectorAll('[data-action-add-task]').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = btn.dataset.actionAddTask;
        const act = s.actions.find(x => x.id === id);
        if (!act || !act.end) return;
        const pick = window.prompt('Task id to add (e.g. t1):', '');
        if (!pick) return;
        const item = list.find(x => x.id === pick.trim());
        if (!item) return;
        act.tasks = act.tasks || [];
        act.tasks.push({
          task_id: item.id,
          work_description: '',
          time_spent_hours: 0.25,
          started_at: act.start,
          finished_at: act.end,
          marked_done: false,
        });
        renderAll();
      });
    });

    bindRoot.querySelectorAll('.schip[data-status]').forEach(btn => {
      btn.addEventListener('click', e => {
        const b = e.currentTarget;
        const id = b.dataset.taskId;
        const st = b.dataset.status;
        const it = list.find(x => x.id === id);
        if (it) { it.status = st; renderAll(); }
      });
    });
    bindRoot.querySelectorAll('[data-task-push]').forEach(btn => {
      btn.addEventListener('click', e => {
        const it = list.find(x => x.id === e.currentTarget.dataset.taskPush);
        if (!it || it.planned_day !== d || d + 1 >= n) return;
        if (it.planned_day != null && it.planned_day !== d + 1) {
          it.drift_from = [...(it.drift_from || []), it.planned_day];
        }
        it.planned_day = d + 1;
        renderAll();
      });
    });
    bindRoot.querySelectorAll('[data-task-pull]').forEach(btn => {
      btn.addEventListener('click', e => {
        const it = list.find(x => x.id === e.currentTarget.dataset.taskPull);
        if (!it) return;
        it.planned_day = d;
        renderAll();
      });
    });
    bindRoot.querySelectorAll('[data-task-block]').forEach(btn => {
      btn.addEventListener('click', e => {
        const it = list.find(x => x.id === e.currentTarget.dataset.taskBlock);
        if (!it) return;
        if (it.blocker) {
          it.blocker = '';
          it.status = it.status === 'blocked' ? 'todo' : it.status;
        } else {
          const reason = window.prompt('Blocker reason?', 'Waiting on dependency');
          if (reason != null && reason !== '') {
            it.blocker = reason;
            it.status = 'blocked';
          }
        }
        renderAll();
      });
    });
    bindRoot.querySelectorAll('[data-dd-add]').forEach(btn => {
      btn.addEventListener('click', e => {
        pendingTaskPlannedDay = parseInt(e.currentTarget.dataset.ddAdd, 10);
        openModal('modal-task');
      });
    });

    if (bindRoot.querySelector('[data-running-elapsed]')) startRunTimerIfNeeded();
    else stopRunTimer();
  }

  function applySprintChrome() {
    const s = sprint();
    const syncText = (a, b, val) => {
      const e1 = document.getElementById(a);
      const e2 = document.getElementById(b);
      if (e1) e1.textContent = val;
      if (e2) e2.textContent = val;
    };
    syncText('sprint-name', 'sp-sprint-name', s.name);
    const badge1 = document.getElementById('sprint-badge');
    const badge2 = document.getElementById('sp-sprint-badge');
    if (badge1) { badge1.textContent = s.badgeText; badge1.className = 'badge ' + s.badge; }
    if (badge2) { badge2.textContent = s.badgeText; badge2.className = 'badge ' + s.badge; }
    syncText('sprint-dates', 'sp-sprint-dates', s.dates);

    document.querySelectorAll('.sprint-chev-prev').forEach(el => {
      el.classList.toggle('disabled', cur === 0);
    });
    document.querySelectorAll('.sprint-chev-next').forEach(el => {
      el.classList.toggle('disabled', cur === sprints.length - 1);
    });
    document.querySelectorAll('.sprint-dots').forEach(container => {
      container.querySelectorAll('.dot').forEach((d, i) => {
        d.classList.toggle('cur', i === cur);
      });
    });
    const sub = document.getElementById('sp-plan-heading-sprint');
    if (sub) sub.textContent = '· ' + s.name;
  }

  function prevSprint() {
    if (cur > 0) { cur--; openDay = null; setView('sprint'); }
  }
  function nextSprint() {
    if (cur < sprints.length - 1) { cur++; openDay = null; setView('sprint'); }
  }
  document.querySelectorAll('.sprint-chev-prev').forEach(b => b.addEventListener('click', prevSprint));
  document.querySelectorAll('.sprint-chev-next').forEach(b => b.addEventListener('click', nextSprint));

  const PROJ_COLOR = {
    'Nexus': 'var(--p-nexus)',
    'Pipeline': 'var(--p-pipe)',
    'Mobile App': 'var(--p-mobile)',
  };
  function parseHours(str) {
    const m = (str || '').match(/(\d+(?:\.\d+)?)\s*h/i);
    return m ? parseFloat(m[1]) : 0;
  }
  function topProject(crumb) {
    const first = (crumb || '').split('/')[0].trim();
    return first && first !== '—' ? first : 'Other';
  }

  function itemFromRow(row) {
    const title = row.dataset.title || '';
    const crumb = (row.querySelector('.crumb')?.textContent || '').trim();
    const est = parseHours(row.querySelector('.est')?.textContent);
    const kind = row.querySelector('.glyph')?.classList.contains('bug') ? 'bug' : 'feat';
    const slug = title.replace(/[^\w\-]+/g, '-').replace(/^-|-$/g, '').slice(0, 48) || 'item';
    return {
      id: 'pin-' + slug + '-' + Math.random().toString(36).slice(2, 7),
      title, crumb, est: est || 1, kind,
      planned_day: null, status: 'todo', drift_from: [],
    };
  }
  function removeItemByTitle(sprintIdx, title) {
    const sp = sprints[sprintIdx];
    sp.items = sp.items.filter(i => i.title !== title);
  }
  function hasItemInSprint(sprintIdx, title) {
    return sprints[sprintIdx].items.some(i => i.title === title);

  function varianceCls(actual, est) {
    if (!actual || actual <= 0) return '';
    if (est <= 0) return 'near';
    const r = actual / est;
    if (r <= 1)    return 'under';
    if (r <= 1.25) return 'near';
    if (r <= 1.5)  return 'over';
    return 'way-over';
  }
  /** B1 segmented bar: green under est, blue at est, blue+yellow/red overrun (same width container). */
  function progVarianceSegments(est, act, status) {
    const hasAct = act > 0;
    const isDoneNoActual = status === 'done' && !hasAct;
    if (isDoneNoActual) return `<span class="near" style="width:100%"></span>`;
    if (est <= 0) return '';
    const r = act / est;
    const EPS = 1e-9;
    if (r <= 0) return '';
    if (r < 1 - EPS) return `<span class="under" style="width:${r * 100}%"></span>`;
    if (r <= 1 + EPS) return `<span class="near" style="width:100%"></span>`;
    const baseW = (est / act) * 100;
    const overCls = r <= 1.5 ? 'over' : 'way-over';
    return `<span class="near" style="width:${baseW}%"></span>`
         + `<span class="${overCls}" style="width:${100 - baseW}%"></span>`;
  }
  function fmtDay(d) {
    const dt = dayDate(d);
    return DOW[dt.getDay()] + ' ' + MON[dt.getMonth()] + ' ' + dt.getDate();
  }
  function fmtClock(iso) {
    const t = new Date(iso);
    return t.toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' });
  }
  function hoursBetweenIso(startIso, endIso) {
    return (new Date(endIso) - new Date(startIso)) / 3600000;
  }
  function taskOptionsHtml(s, d) {
    const list = s.items;
    const onDay = list.filter(i => i.planned_day === d);
    const rest = list.filter(i => i.planned_day !== d);
    let h = '<option value="">— Pick task —</option>';
    onDay.forEach(i => {
      h += '<option value="' + escapeHtml(i.id) + '">' + escapeHtml(i.title) + '</option>';
    });
    rest.forEach(i => {
      h += '<option value="' + escapeHtml(i.id) + '">' + escapeHtml(i.title) + ' (other day)</option>';
    });
    return h;
  }
  function driftChain(item) {
    const chain = [...(item.drift_from || [])];
    if (item.planned_day != null) chain.push(item.planned_day);
    return chain.map(fmtDay).join(' → ');
  }

  function renderSummary() {
    const el = document.getElementById('sp-sprint-summary');
    if (!el) return;
    const s = sprint();
    const list = items();
    const total = list.length;
    const done = list.filter(i => i.status === 'done').length;
    const doing = list.filter(i => i.status === 'doing').length;
    const blocked = list.filter(i => i.status === 'blocked').length;
    const totalEst = list.reduce((a, i) => a + i.est, 0);
    const totalAct = list.reduce((a, i) => a + itemActual(s, i), 0);
    const drifted = list.filter(i => (i.drift_from || []).length > 0).length;

    const hoursVar = varianceCls(totalAct, totalEst);
    const hoursCls = hoursVar === 'under' ? 'ok'
                   : (hoursVar === 'over' || hoursVar === 'way-over') ? 'warn' : '';
    const doneCls = (total > 0 && done === total) ? 'ok' : '';

    let phase = '';
    if (s.badge === 'done') {
      phase = 'Sprint complete';
    } else if (s.badge === 'active') {
      const dayIdx = Math.max(0, Math.min(s.len - 1,
        Math.floor((today.getTime() - s.start.getTime()) / 86400000)));
      phase = `Day ${dayIdx + 1} of ${s.len} · ${doing} in flight`;
    } else {
      phase = 'Not started — planning only';
    }

    const fmtH = h => (Number.isInteger(h) ? h : h.toFixed(1)) + 'h';

    el.innerHTML =
        `<div class="stat"><div class="label">Done</div>`
      +   `<div class="val ${doneCls}">${done}/${total}<span class="sub"> items</span></div></div>`
      + `<div class="divider"></div>`
      + `<div class="stat"><div class="label">Hours actual / planned</div>`
      +   `<div class="val ${hoursCls}">${fmtH(totalAct)} <span class="sub">/ ${fmtH(totalEst)}</span></div></div>`
      + `<div class="divider"></div>`
      + `<div class="stat"><div class="label">Drift</div>`
      +   `<div class="val ${drifted > 0 ? 'warn' : ''}">${drifted}<span class="sub"> item${drifted === 1 ? '' : 's'} moved</span></div></div>`
      + (blocked > 0
          ? `<div class="divider"></div><div class="stat"><div class="label">Blocked</div><div class="val warn">${blocked}</div></div>`
          : '')
      + `<div class="phase">${phase}</div>`;
  }

  function renderDays() {
    const daysEl = document.getElementById('sp-days-list');
    if (!daysEl) return;
    const s = sprint();
    const list = items();
    const n = s.len;
    const isDoneSprint = s.badge === 'done';
    const isPlannedSprint = s.badge === 'planned';
    let html = '';

    for (let d = 0; d < n; d++) {
      const dt = dayDate(d);
      const dow = dt.getDay();
      const isToday = sameDay(dt, today);
      const isPast = dt < today && !isToday;
      const hasHistory = (isPast || isToday) && !isPlannedSprint;

      const dayItems = list.filter(i => i.planned_day === d);
      const ghostItems = list.filter(i =>
        ((i.drift_from || []).includes(d) && i.planned_day !== d)
        || (hoursForTaskOnDay(s, i, d) > 0 && i.planned_day !== d && !(i.drift_from || []).includes(d)));
      const planned = dayItems.reduce((a, i) => a + i.est, 0);
      const actual = list.reduce((a, i) => a + dayActualFor(s, i, d), 0);
      const doneCount = dayItems.filter(i => i.status === 'done').length;
      const pushedOut = list.filter(i =>
        (i.drift_from || []).includes(d) && i.planned_day !== d).length;
      const rolledIn = list.filter(i =>
        i.planned_day === d && (i.drift_from || []).length > 0).length;
      const over = planned > DAILY_CAP;

      const actualCls = varianceCls(actual, planned);
      const dayNoteVal = dayTitle(s, d);
      const isEmpty = dayItems.length === 0;
      const hasNoRows = dayItems.length === 0 && ghostItems.length === 0;

      html += `<div class="day ${isToday?'today':''} ${isPast?'past':''}" data-day="${d}">`
           +   `<div class="day-head">`
           +     `<div class="day-dow">${DOW[dow]}</div>`
           +     `<div class="day-date ${isToday?'today-label':''}">${MON[dt.getMonth()]} <span class="date-num">${dt.getDate()}</span>${isToday?'  · today':''}</div>`
           +     `<div></div>`
           +     `<div class="day-hours ${over?'over':''}">`
           +        `<b>${planned}h</b> / ${DAILY_CAP}h`
           +        (hasHistory && (actual > 0 || doneCount > 0)
                      ? `<div class="day-hours-actual ${actualCls}">${actual}h actual</div>`
                      : '')
           +     `</div>`
           +   `</div>`
           +   `<div class="day-cap-bar"><div class="fill ${over?'over':''}" style="width:${Math.min(100,(planned/DAILY_CAP)*100)}%"></div></div>`;

      if (hasHistory && !isEmpty) {
        const doneCls = doneCount === dayItems.length ? '' : 'incomplete';
        html += `<div class="day-stats">`
             +   `<span class="stat done ${doneCls}">✓ <b>${doneCount}/${dayItems.length}</b> done</span>`
             +   (pushedOut > 0
                  ? `<span class="stat pushed" title="${pushedOut} item${pushedOut===1?'':'s'} originally here, moved to later day">↗ <b>${pushedOut}</b> pushed out</span>`
                  : '')
             +   (rolledIn > 0
                  ? `<span class="stat rolled" title="${rolledIn} item${rolledIn===1?'':'s'} moved here from an earlier day">↙ <b>${rolledIn}</b> rolled in</span>`
                  : '')
             +   (actual === 0 && isPast
                  ? `<span class="gap-signal">· no logged work</span>`
                  : '')
             + `</div>`;
      }

      html += `<div class="day-items">`;
      if (hasNoRows) {
        html += `<div class="day-empty">Nothing scheduled.</div>`;
      } else {
        dayItems.forEach(i => {
          const g = i.kind === 'bug' ? '●' : '◉';
          const status = i.status || 'todo';
          const drift = (i.drift_from || []).length;
          const lastSrc = drift > 0 ? (i.drift_from || [])[i.drift_from.length - 1] : null;
          const fromBadge = drift > 0 && lastSrc != null
              ? `<span class="from-day" title="Rolled in from ${fmtDay(lastSrc)}">↙ ${DOW[dayDate(lastSrc).getDay()]} ${dayDate(lastSrc).getDate()}</span>`
              : '';
          const act = cumulativeActualUpTo(s, i, d);
          const todayDelta = dayActualFor(s, i, d);
          const showProg = (act > 0 || status === 'done') && !isPlannedSprint;
          const vCls = varianceCls(act, i.est);
          const hasActual = act > 0;
          const hoursCell = hasActual
              ? `<span class="actual ${vCls}">${act}h</span> <span class="est-inline">/ ${i.est}h</span>`
                  + (todayDelta > 0 ? `<span class="day-delta">+${todayDelta}h</span>` : '')
              : `<span class="est-inline">${i.est}h</span>`;
          const rowCls = status === 'done' ? 'is-done' : (status === 'blocked' ? 'is-blocked' : '');

          html += `<div class="day-item ${rowCls}" draggable="true" data-id="${i.id}">`
               +   `<span class="status-dot ${status}" title="${status}"></span>`
               +   `<span class="g ${i.kind}">${g}</span>`
               +   `<div class="name-wrap">`
               +     `<div class="title"><span class="crumb-inline">${i.crumb}</span>${i.title}`
               +        (drift > 0 ? `<span class="drift" title="Postponed ${drift}× · ${driftChain(i)}">↻${drift}</span>` : '')
               +        fromBadge
               +        (i.blocker ? `<span class="blocker-dot" title="${i.blocker.replace(/"/g,'&quot;')}"></span>` : '')
               +     `</div>`
               +     (showProg
                      ? `<div class="prog">${progVarianceSegments(i.est, act, status)}</div>`
                      : '')
               +   `</div>`
               +   `<div class="h">${hoursCell}</div>`
               +   `<span class="x" data-unschedule="${i.id}" title="Unschedule">×</span>`
               +  `</div>`;
        });
        ghostItems.forEach(i => {
          const g = i.kind === 'bug' ? '●' : '◉';
          const status = i.status || 'todo';
          const movedTo = i.planned_day;
          const movedToLabel = movedTo == null
              ? 'unscheduled'
              : `${DOW[dayDate(movedTo).getDay()]} ${dayDate(movedTo).getDate()}`;
          const rowCls = status === 'done' ? 'is-done' : (status === 'blocked' ? 'is-blocked' : '');
          const cum = cumulativeActualUpTo(s, i, d);
          const todayDelta = dayActualFor(s, i, d);
          const vClsG = varianceCls(cum, i.est);
          const showGhostProg = (cum > 0 || status === 'done') && !isPlannedSprint;
          const hoursCellG = cum > 0
              ? `<span class="actual ${vClsG}">${cum}h</span> <span class="est-inline">/ ${i.est}h</span>`
                  + (todayDelta > 0 ? `<span class="day-delta">+${todayDelta}h</span>` : '')
              : `<span class="est-inline">${i.est}h</span>`;
          html += `<div class="day-item is-ghost ${rowCls}" draggable="false">`
               +   `<span class="status-dot ${status}" title="${status}"></span>`
               +   `<span class="g ${i.kind}">${g}</span>`
               +   `<div class="name-wrap">`
               +     `<div class="title"><span class="crumb-inline">${i.crumb}</span>${i.title}`
               +        `<span class="moved-to">→ ${movedToLabel}</span>`
               +        (i.blocker ? `<span class="blocker-dot" title="${i.blocker.replace(/"/g,'&quot;')}"></span>` : '')
               +     `</div>`
               +     (showGhostProg
                      ? `<div class="prog">${progVarianceSegments(i.est, cum, status)}</div>`
                      : '')
               +   `</div>`
               +   `<div class="h">${hoursCellG}</div>`
               +   `<span class="x x--ghost-slot" aria-hidden="true"></span>`
               +  `</div>`;
        });
      }
      html +=   `</div>`;

      if (hasHistory || isDoneSprint) {
        html += `<div class="day-note">`
             +   `<input type="text" placeholder="Short title for this day…" value="${(dayNoteVal || '').replace(/"/g,'&quot;')}" data-day="${d}">`
             + `</div>`;
      }

      html += `</div>`;
    }
    daysEl.innerHTML = html;

    const schedEl = document.getElementById('sp-scheduled-total');
    const unschEl = document.getElementById('sp-unscheduled-total');
    const scheduled = list.filter(i => i.planned_day != null).reduce((a, i) => a + i.est, 0);
    const unscheduled = list.filter(i => i.planned_day == null).reduce((a, i) => a + i.est, 0);
    if (schedEl) schedEl.textContent = scheduled + 'h';
    if (unschEl) unschEl.textContent = unscheduled + 'h';

    daysEl.querySelectorAll('.day-item[draggable="true"]').forEach(row => {
      row.addEventListener('dragstart', e => {
        e.dataTransfer.setData('text/plain', row.dataset.id);
        e.dataTransfer.effectAllowed = 'move';
        row.classList.add('dragging');
      });
      row.addEventListener('dragend', () => row.classList.remove('dragging'));
    });

    daysEl.querySelectorAll('.day').forEach(dayEl => {
      dayEl.addEventListener('dragover', e => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        dayEl.classList.add('drop-hover');
      });
      dayEl.addEventListener('dragleave', e => {
        if (!dayEl.contains(e.relatedTarget)) dayEl.classList.remove('drop-hover');
      });
      dayEl.addEventListener('drop', e => {
        e.preventDefault();
        dayEl.classList.remove('drop-hover');
        const id = e.dataTransfer.getData('text/plain');
        const it = list.find(i => i.id === id);
        if (!it) return;
        const newDay = parseInt(dayEl.dataset.day, 10);
        if (it.planned_day != null && it.planned_day !== newDay) {
          it.drift_from = [...(it.drift_from || []), it.planned_day];
        }
        it.planned_day = newDay;
        renderAll();
      });
    });

    daysEl.querySelectorAll('.x[data-unschedule]').forEach(x => {
      x.addEventListener('click', e => {
        e.stopPropagation();
        const it = list.find(i => i.id === x.dataset.unschedule);
        if (it) { it.planned_day = null; renderAll(); }
      });
    });

    daysEl.querySelectorAll('.day-note input[data-day]').forEach(inp => {
      inp.addEventListener('input', () => {
        setDayField(s, parseInt(inp.dataset.day, 10), 'title', inp.value);
      });
    });

    daysEl.querySelectorAll('.day').forEach(dayEl => {
      dayEl.addEventListener('click', e => {
        if (e.target.closest('.day-item')) return;
        if (e.target.closest('.day-note')) return;
        if (e.target.closest('.day-cap-bar')) return;
        openDayDetail(parseInt(dayEl.dataset.day, 10));
      });
    });
  }

  function renderAll() {
    applySprintChrome();
    renderPlannerCart();
    renderChips();
    renderSummary();
    renderSprintCart();
    renderDays();

    const viewSprintDayEl = document.getElementById('view-sprint-day');
    const viewTodayEl = document.getElementById('view-today');
    if (viewSprintDayEl && !viewSprintDayEl.hidden) {
      if (openDaySprintIdx == null || openDay == null) {
        openDaySprintIdx = cur;
        openDay = 0;
      }
      const si = openDaySprintIdx;
      if (si >= 0 && si < sprints.length) {
        renderDayPage(sprints[si], openDay, 'sprint', si);
      }
    } else if (viewSprintDayEl) {
      viewSprintDayEl.innerHTML = '';
    }

    if (viewTodayEl && !viewTodayEl.hidden) {
      if (todayBrowseDate == null) todayBrowseDate = calendarDateAtMidnight(today);
      const loc = locateCalendarDateInPlan(todayBrowseDate);
      if (loc) {
        renderDayPage(loc.sp, loc.d, 'today', loc.si);
      } else if (sameDay(todayBrowseDate, today) && sprintIdxContainingToday() == null) {
        renderTodayEmptyState();
        stopRunTimer();
      } else {
        renderTodayGapPage(todayBrowseDate);
        stopRunTimer();
      }
    } else if (viewTodayEl) {
      viewTodayEl.innerHTML = '';
      stopRunTimer();
    }

    if (!document.querySelector('[data-running-elapsed]')) stopRunTimer();
  }

  // search: live filter + auto-expand + highlight
  const search = document.getElementById('search');
  search.addEventListener('input', () => {
    const q = search.value.trim().toLowerCase();
    document.querySelectorAll('.row').forEach(r => {
      const t = (r.dataset.title || '').toLowerCase();
      const hit = q && t.includes(q);
      r.classList.toggle('match', !!hit);
      r.style.display = (!q || hit) ? '' : 'none';
    });
    const visibleAny = q.length > 0;
    document.querySelectorAll('.bucket-h, .inline-add, .tree-node, .tree-sub-name').forEach(el => {
      el.style.opacity = visibleAny ? '0.5' : '1';
    });
  });

  const pop = document.getElementById('menu-pop');
  document.querySelectorAll('[data-menu]').forEach(m => {
    m.addEventListener('click', e => {
      e.stopPropagation();
      const r = m.getBoundingClientRect();
      pop.style.left = Math.min(window.innerWidth - 220, r.right + 4) + 'px';
      pop.style.top = (r.top - 4) + 'px';
      pop.classList.add('open');
    });
  });
  document.addEventListener('click', () => pop.classList.remove('open'));

  document.querySelectorAll('.row .chip').forEach(c => {
    c.addEventListener('click', e => {
      e.stopPropagation();
      const row = c.closest('.row');
      const title = row.dataset.title || '';
      if (!title) return;
      if (hasItemInSprint(cur, title)) {
        removeItemByTitle(cur, title);
      } else {
        sprints[cur].items.push(itemFromRow(row));
      }
      renderAll();
    });
  });

  function openModal(id) {
    const m = document.getElementById(id);
    if (!m) return;
    m.hidden = false;
    const focusable = m.querySelector('input, select, textarea, button');
    if (focusable) setTimeout(() => focusable.focus(), 0);
  }
  function closeModal(id) {
    const m = document.getElementById(id);
    if (m) m.hidden = true;
  }
  document.querySelectorAll('.modal-backdrop').forEach(bd => {
    bd.addEventListener('click', e => {
      if (e.target === bd) bd.hidden = true;
    });
  });
  document.querySelectorAll('[data-close]').forEach(btn => {
    btn.addEventListener('click', () => closeModal(btn.dataset.close));
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      document.querySelectorAll('.modal-backdrop:not([hidden])').forEach(m => m.hidden = true);
    }
  });

  const headBtns = document.querySelectorAll('.head-add-btn');
  if (headBtns[0]) headBtns[0].addEventListener('click', () => openModal('modal-project'));
  if (headBtns[1]) headBtns[1].addEventListener('click', () => openModal('modal-task'));

  const taskTypeHints = {
    task:    "Plain sub-task under a Feature, or a standalone item.",
    feature: "A larger unit of work — can decompose into sub-tasks and bugs.",
    bug:     "Something broken. Pick severity below.",
  };
  document.querySelectorAll('#task-type-toggle .seg-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#task-type-toggle .seg-btn').forEach(b => b.classList.toggle('active', b === btn));
      const t = btn.dataset.type;
      document.getElementById('task-type-hint').textContent = taskTypeHints[t] || '';
      document.querySelectorAll('#modal-task .subtype-field').forEach(f => {
        f.hidden = f.dataset.showWhen !== t;
      });
    });
  });
  document.querySelectorAll('#modal-task [data-sev]').forEach(btn => {
    btn.addEventListener('click', () => {
      btn.parentElement.querySelectorAll('.seg-btn').forEach(b => b.classList.toggle('active', b === btn));
    });
  });
  const taskSubmit = document.getElementById('task-create-submit');
  if (taskSubmit) taskSubmit.addEventListener('click', () => {
    const type = document.querySelector('#task-type-toggle .seg-btn.active')?.dataset.type;
    const sev = document.querySelector('#modal-task [data-sev].active')?.dataset.sev;
    const payload = {
      type,
      title: document.getElementById('task-title').value.trim(),
      project: document.getElementById('task-project').value,
      priority: document.getElementById('task-priority').value,
      estimate_hours: parseFloat(document.getElementById('task-estimate').value) || null,
      sprint: document.getElementById('task-sprint').value || null,
      severity: type === 'bug' ? sev : undefined,
      ideation_status: type === 'feature' ? document.getElementById('task-ideation').value : undefined,
      notes: document.getElementById('task-notes').value.trim() || undefined,
    };
    if (!payload.title) { document.getElementById('task-title').focus(); return; }
    console.log('[mockup] create task', payload);
    if (pendingTaskPlannedDay != null) {
      const est = parseFloat(document.getElementById('task-estimate').value) || 1;
      const kind = type === 'bug' ? 'bug' : 'feat';
      const crumb = crumbFromProjectSelect(document.getElementById('task-project').value);
      items().push({
        id: 't' + Date.now().toString(36),
        kind,
        title: payload.title,
        crumb,
        est,
        planned_day: pendingTaskPlannedDay,
        status: 'todo',
        drift_from: [],
      });
      pendingTaskPlannedDay = null;
    }
    closeModal('modal-task');
    renderAll();
  });

  const projScopeHints = {
    top: "A new top-level project shown as its own tree node.",
    sub: "Adds a subproject under an existing project (uses parent's color).",
  };
  document.querySelectorAll('#project-scope-toggle .seg-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#project-scope-toggle .seg-btn').forEach(b => b.classList.toggle('active', b === btn));
      const scope = btn.dataset.scope;
      document.getElementById('project-scope-hint').textContent = projScopeHints[scope] || '';
      document.getElementById('project-parent-field').hidden = scope !== 'sub';
      document.getElementById('project-color-field').hidden = scope !== 'top';
      document.getElementById('modal-project-title').textContent =
        scope === 'sub' ? 'New subproject' : 'New project';
    });
  });
  document.querySelectorAll('#project-color-swatches .swatch').forEach(sw => {
    sw.addEventListener('click', () => {
      document.querySelectorAll('#project-color-swatches .swatch').forEach(s => s.classList.toggle('active', s === sw));
    });
  });
  const projSubmit = document.getElementById('project-create-submit');
  if (projSubmit) projSubmit.addEventListener('click', () => {
    const scope = document.querySelector('#project-scope-toggle .seg-btn.active')?.dataset.scope;
    const payload = {
      scope,
      name: document.getElementById('project-name').value.trim(),
      parent: scope === 'sub' ? document.getElementById('project-parent').value : undefined,
      color: scope === 'top'
        ? document.querySelector('#project-color-swatches .swatch.active')?.dataset.color
        : undefined,
      description: document.getElementById('project-desc').value.trim() || undefined,
    };
    if (!payload.name) { document.getElementById('project-name').focus(); return; }
    console.log('[mockup] create project', payload);
    closeModal('modal-project');
  });

  // ---- Task detail drawer --------------------------------------------------
  function openTaskView({ kind, title, crumb, est, severity, status, bucket, sprint }) {
    const drawer = document.getElementById('view-task');
    const backdrop = document.getElementById('view-task-backdrop');
    if (!drawer || !backdrop) return;

    // Pick which sample article matches the kind
    const articles = drawer.querySelectorAll('.task-view');
    const want = kind === 'bug' ? 'bug' : (kind === 'feat' || kind === 'feature') ? 'feature' : 'task';
    let shown = null;
    articles.forEach(a => {
      const match = a.dataset.kind === want;
      a.hidden = !match;
      if (match) shown = a;
    });
    if (!shown) return;

    // Patch in the clicked task's data
    const titleInp = shown.querySelector('.task-title');
    if (titleInp) titleInp.value = title || titleInp.value;
    const crumbEl = shown.querySelector('.crumb-link');
    if (crumbEl && crumb) {
      const parts = crumb.split('/').map(s => s.trim()).filter(Boolean);
      crumbEl.innerHTML = parts.map(p => `<a href="#">${escapeHtml(p)}</a>`).join(' <span class="sep">/</span> ');
    }
    const sevEl = shown.querySelector('.task-head .sev');
    if (sevEl && severity) {
      sevEl.className = 'sev ' + severity;
      sevEl.textContent = severity;
    }
    const statusPill = shown.querySelector('.pill.status');
    if (statusPill && status) {
      statusPill.classList.remove('todo', 'doing', 'done', 'blocked');
      statusPill.classList.add(status);
      statusPill.textContent = status[0].toUpperCase() + status.slice(1);
    }
    const bucketPill = shown.querySelector('.pill.bucket');
    if (bucketPill && bucket) {
      bucketPill.classList.remove('now', 'next', 'later', 'someday');
      bucketPill.classList.add(bucket);
      bucketPill.textContent = bucket.toUpperCase();
    }

    backdrop.hidden = false;
    drawer.hidden = false;
  }

  function closeTaskView() {
    const drawer = document.getElementById('view-task');
    const backdrop = document.getElementById('view-task-backdrop');
    if (drawer) drawer.hidden = true;
    if (backdrop) backdrop.hidden = true;
  }

  document.getElementById('view-task-backdrop')?.addEventListener('click', closeTaskView);
  document.querySelectorAll('#view-task .task-close, #view-task .task-back').forEach(b => {
    b.addEventListener('click', closeTaskView);
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && !document.getElementById('view-task').hidden) closeTaskView();
  });

  function kindFromGlyph(glyphEl) {
    if (!glyphEl) return 'task';
    if (glyphEl.classList.contains('bug')) return 'bug';
    if (glyphEl.classList.contains('feat')) return 'feat';
    return 'task';
  }

  // Backlog rows (Priority + Projects panes)
  document.querySelectorAll('#pane-priority .row, #pane-projects .row').forEach(row => {
    row.addEventListener('click', e => {
      if (e.target.closest('[data-menu]')) return;
      if (e.target.closest('.chip')) return;
      const glyph = row.querySelector('.glyph');
      const sevEl = row.querySelector('.sev');
      const sev = sevEl ? (sevEl.classList.contains('crit') ? 'crit'
                       : sevEl.classList.contains('med') ? 'med' : 'low') : null;
      // Bucket inferred from preceding bucket-h
      let bucket = 'next';
      let p = row.previousElementSibling;
      while (p) {
        if (p.classList && p.classList.contains('bucket-h')) {
          const t = p.textContent.toLowerCase();
          if (t.includes('now')) bucket = 'now';
          else if (t.includes('next')) bucket = 'next';
          else if (t.includes('later')) bucket = 'later';
          else if (t.includes('someday')) bucket = 'someday';
          break;
        }
        p = p.previousElementSibling;
      }
      openTaskView({
        kind: kindFromGlyph(glyph),
        title: row.dataset.title || row.querySelector('.title')?.firstChild?.textContent?.trim(),
        crumb: row.querySelector('.crumb')?.textContent.trim(),
        est: row.querySelector('.est')?.textContent.trim(),
        severity: sev,
        status: 'todo',
        bucket,
      });
    });
  });

  // Day items in sprint planner
  document.addEventListener('click', e => {
    const di = e.target.closest('.day-item');
    if (!di || e.target.closest('.x') || e.target.closest('[data-unschedule]')) return;
    if (!di.closest('#sp-days-list')) return;
    const id = di.dataset.id;
    const it = items().find(x => x.id === id);
    if (!it) return;
    openTaskView({
      kind: it.kind,
      title: it.title,
      crumb: it.crumb,
      status: it.status,
      bucket: 'now',
    });
  });

  // Day-page tasks (dd-task)
  document.addEventListener('click', e => {
    const t = e.target.closest('.dd-task');
    if (!t) return;
    if (e.target.closest('.dd-actions')) return;
    if (e.target.closest('.schip')) return;
    const id = t.dataset.taskId;
    const sp = openDaySprintIdx != null ? sprints[openDaySprintIdx] : sprint();
    const it = sp.items.find(x => x.id === id);
    if (!it) return;
    openTaskView({
      kind: it.kind,
      title: it.title,
      crumb: it.crumb,
      status: it.status,
      bucket: 'now',
    });
  });

  setView('planner');
  }

  boot().catch((err) => {
    console.error(err);
    document.getElementById('reference-mount').innerHTML =
      '<p style="padding:24px;color:#e7e9ee;font-family:system-ui">Failed to load reference partials. Serve this folder over HTTP (e.g. <code>npx serve mobile/nx_projects/reference/desktop</code>) so <code>fetch()</code> can load <code>partials/*.html</code>.<br><br>' +
      String(err) + '</p>';
  });
</script>
</body>
</html>
