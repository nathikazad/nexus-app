publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  go_router: ^17.0.1
  google_fonts: ^8.0.2
  graphql_flutter: ^5.1.2
  intl: ^0.20.2
  flutter_riverpod: ^3.2.0
  nx_db:
    path: ../nx_db
  riverpod: ^3.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
