<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>body { font-family: Inter, sans-serif; }</style>
</head>
<body class="bg-white text-slate-900 antialiased m-0">
  <div class="h-[59px] bg-white w-full"></div>
  <div class="max-w-[375px] mx-auto">
    <div class="flex items-center px-5 pt-2 pb-2 gap-3">
      <span class="text-sm text-sky-600 font-medium">Cancel</span>
      <span class="text-[15px] font-medium flex-1 text-center">Add time block</span>
      <span class="text-sm text-slate-400">Save</span>
    </div>
    <main class="px-5 pt-3 pb-8">
      <div class="text-[13px] font-medium mb-1.5">Name</div>
      <div class="px-3 py-2.5 border border-slate-200 rounded-[10px] text-sm text-slate-400 mb-3">e.g., Evening walk, Reading...</div>
      <div class="text-[13px] font-medium mb-1.5">Category</div>
      <div class="flex items-center gap-2 px-3 py-2.5 border border-slate-200 rounded-[10px] mb-3">
        <span class="text-sm flex-1 text-slate-400">Select category</span>
        <span class="text-xs text-slate-400">▶</span>
      </div>
      <div class="flex gap-2.5 mb-3">
        <div class="flex-1">
          <div class="text-[13px] font-medium mb-1.5">Start time</div>
          <div class="px-3 py-2.5 border border-slate-200 rounded-[10px] text-sm text-center text-slate-400">Tap to set</div>
        </div>
        <div class="flex-1">
          <div class="text-[13px] font-medium mb-1.5">End time</div>
          <div class="px-3 py-2.5 border border-slate-200 rounded-[10px] text-sm text-center text-slate-400">Tap to set</div>
        </div>
      </div>
      <div class="h-px bg-slate-100 my-3"></div>
      <div class="flex justify-between items-center mb-2">
        <span class="text-[13px] font-medium">Associated tasks</span>
        <span class="text-xs text-sky-600 font-medium">+ Add task</span>
      </div>
      <div class="py-3 text-center text-slate-400 text-[13px]">No tasks linked yet</div>
      <div class="h-px bg-slate-100 my-3"></div>
      <div class="text-[13px] font-medium mb-1.5">Notes</div>
      <div class="px-3 py-2.5 border border-slate-200 rounded-[10px] min-h-16 text-[13px] text-slate-400">Optional — add notes...</div>
    </main>
  </div>
</body>
</html>
