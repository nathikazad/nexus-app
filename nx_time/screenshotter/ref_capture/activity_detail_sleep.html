<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>body { font-family: Inter, sans-serif; }</style>
</head>
<body class="bg-white text-slate-900 antialiased m-0">
  <!-- Match iOS safe area inset ~59pt + 8pt header padding below it -->
  <div class="h-[59px] bg-white w-full"></div>
  <div class="max-w-[375px] mx-auto">
    <div class="flex items-center px-5 pt-2 pb-2 gap-3">
      <span class="w-8 h-8 flex items-center justify-center text-sky-600">←</span>
      <span class="text-[15px] font-medium flex-1 text-center">Activity detail</span>
      <span class="text-[13px] text-sky-600 font-medium">Edit</span>
    </div>
    <main class="px-5 pt-2 pb-8">
      <div class="text-xl font-medium mb-1.5">Sleep</div>
      <div class="flex items-center gap-2 mb-3">
        <span class="bg-[#EEEDFE] text-[#3C3489] text-xs font-medium px-2.5 py-1 rounded-xl inline-flex items-center gap-1">
          <span class="inline-block w-2 h-2 rounded-full bg-[#534AB7]"></span>
          Sleep
        </span>
        <span class="text-[13px] text-slate-500">Thu, Oct 26</span>
      </div>
      <div class="flex items-center gap-0 px-4 py-3 bg-slate-50 rounded-[14px]">
        <div class="flex-1 text-center">
          <div class="text-[11px] text-slate-400 mb-0.5">start</div>
          <div class="text-lg font-medium">12:00<span class="text-[13px] font-normal text-slate-500"> AM</span></div>
        </div>
        <div class="flex-[2] flex items-center px-3 mt-2.5">
          <div class="flex-1 h-px bg-slate-200"></div>
          <div class="px-2 py-0.5 text-[11px] text-slate-400">6h 50m</div>
          <div class="flex-1 h-px bg-slate-200"></div>
        </div>
        <div class="flex-1 text-center">
          <div class="text-[11px] text-slate-400 mb-0.5">end</div>
          <div class="text-lg font-medium">6:50<span class="text-[13px] font-normal text-slate-500"> AM</span></div>
        </div>
      </div>
      <div class="h-px bg-slate-100 my-3"></div>
      <div class="text-[13px] font-medium mb-2">Associated tasks</div>
      <div class="py-3 text-center text-slate-400 text-[13px]">No tasks linked to this activity</div>
      <div class="h-px bg-slate-100 my-3"></div>
      <div class="flex justify-between items-center">
        <span class="text-[13px] font-medium">Wearable captures</span>
        <span class="text-[13px] text-sky-600">View 18 photos ▶</span>
      </div>
    </main>
  </div>
</body>
</html>
