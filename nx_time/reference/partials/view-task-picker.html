                    </div>

                    <!-- Task Item (Selected) -->
                    <div class="flex items-start gap-3 p-2.5 -mx-2 rounded-xl hover:bg-slate-50 transition-colors cursor-pointer group">

                        </div>
                        <span class="text-[10px] font-medium text-orange-600 bg-orange-50 px-1.5 py-0.5 rounded">pinned yest.</span>

                    <div class="flex items-start gap-3 p-2.5 -mx-2 rounded-xl hover:bg-slate-50 transition-colors cursor-pointer group">
                        <div class="w-5 h-5 rounded border border-slate-300 flex items-center justify-center shrink-0 mt-0.5 group-hover:border-slate-400 transition-colors"></div>
