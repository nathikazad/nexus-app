    <div id="page-task-create" class="page hidden flex-col h-full w-full absolute inset-0 bg-white z-30">
        <header class="flex items-center justify-between px-5 pt-12 pb-3 border-b border-slate-100 shrink-0">
            <button type="button" onclick="navigateBack()" class="text-sm font-medium text-slate-500 hover:text-slate-700 transition-colors">Cancel</button>
            <h1 class="text-base font-semibold tracking-tight text-slate-900">New task</h1>
            <button type="button" class="text-sm font-semibold text-slate-300">Create</button>
        </header>

        <main class="flex-1 overflow-y-auto">
            <!-- Task name -->
            <div class="px-5 pt-5 pb-3">
                <label class="block text-xs font-medium text-slate-500 uppercase tracking-widest mb-2">Task name</label>
                <div class="px-3.5 py-2.5 border border-slate-200 rounded-xl text-sm text-slate-400 bg-white">
                    What needs to be done?
                </div>
            </div>

            <!-- Parent -->
            <div class="px-5 pb-5">
                <label class="block text-xs font-medium text-slate-500 uppercase tracking-widest mb-2">Parent</label>
                <button type="button" onclick="navigate('page-projects-browse', true)" class="w-full flex items-center gap-3 px-3.5 py-3 border border-slate-200 rounded-xl bg-white hover:bg-slate-50 transition-colors text-left">
                    <iconify-icon icon="solar:folder-linear" class="text-lg text-slate-400 shrink-0"></iconify-icon>
                    <span class="flex-1 text-sm text-slate-400">None — standalone task</span>
                    <span class="text-xs font-medium text-[#F97316] shrink-0">Select</span>
                    <iconify-icon icon="solar:alt-arrow-right-linear" class="text-slate-400 shrink-0"></iconify-icon>
                </button>
            </div>

            <div class="h-px bg-slate-100 mx-5"></div>

            <!-- Date quick picks -->
            <div class="px-5 pt-5 pb-3">
                <label class="block text-xs font-medium text-slate-500 uppercase tracking-widest mb-2">Date <span class="text-slate-400 normal-case font-normal">(optional)</span></label>
                <div class="flex items-center gap-2 overflow-x-auto hide-scrollbar">
                    <button type="button" class="px-3.5 py-2 rounded-full border border-slate-200 text-xs font-medium text-slate-600 hover:bg-slate-50 transition-colors whitespace-nowrap">Today</button>
                    <button type="button" class="px-3.5 py-2 rounded-full border border-slate-200 text-xs font-medium text-slate-600 hover:bg-slate-50 transition-colors whitespace-nowrap">Tomorrow</button>
                    <button type="button" class="px-3.5 py-2 rounded-full border border-slate-200 text-xs font-medium text-slate-600 hover:bg-slate-50 transition-colors whitespace-nowrap inline-flex items-center gap-1">
                        <iconify-icon icon="solar:calendar-linear" class="text-sm"></iconify-icon>
                        Pick date
                    </button>
                </div>
            </div>

            <!-- Time -->
            <div class="px-5 pb-5">
                <label class="block text-xs font-medium text-slate-500 uppercase tracking-widest mb-2">Time <span class="text-slate-400 normal-case font-normal">(optional)</span></label>
                <div class="flex gap-2.5">
                    <div class="flex-1 px-3.5 py-2.5 border border-slate-200 rounded-xl text-sm text-slate-400 text-center bg-slate-50">
                        Start
                    </div>
                    <div class="flex-1 px-3.5 py-2.5 border border-slate-200 rounded-xl text-sm text-slate-400 text-center bg-slate-50">
                        End
                    </div>
                </div>
                <p class="text-[11px] text-slate-400 mt-1.5">Set a date first to enable time</p>
            </div>

            <div class="h-px bg-slate-100 mx-5"></div>

            <!-- Tags -->
            <div class="px-5 py-5">
                <label class="block text-xs font-medium text-slate-500 uppercase tracking-widest mb-2">Tags <span class="text-slate-400 normal-case font-normal">(optional)</span></label>
                <div class="flex flex-wrap gap-2">
                    <button class="px-2.5 py-1 rounded-md border border-slate-200 border-dashed text-slate-400 hover:text-slate-900 text-xs font-medium">+ add tag</button>
                </div>
            </div>

            <div class="h-px bg-slate-100 mx-5"></div>

            <!-- Notes -->
            <div class="px-5 py-5 pb-10">
                <label class="block text-xs font-medium text-slate-500 uppercase tracking-widest mb-2">Notes <span class="text-slate-400 normal-case font-normal">(optional)</span></label>
                <div class="px-3.5 py-3 border border-slate-200 rounded-xl min-h-[72px] text-sm text-slate-400 leading-relaxed bg-white">
                    Add any context...
                </div>
            </div>
        </main>
    </div>
