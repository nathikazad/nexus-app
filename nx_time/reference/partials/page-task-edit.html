    <div id="page-task-edit" class="page hidden flex-col h-full w-full absolute inset-0 bg-white z-30">
        <header class="flex items-center justify-between px-5 pt-12 pb-3 border-b border-slate-100 shrink-0">
            <button type="button" onclick="navigateBack()" class="text-sm font-medium text-slate-500 hover:text-slate-700 transition-colors">Cancel</button>
            <h1 class="text-base font-semibold tracking-tight text-slate-900">Edit task</h1>
            <button type="button" onclick="navigateBack()" class="text-sm font-semibold text-[#F97316] hover:text-[#FB923C] transition-colors">Save</button>
        </header>

        <main class="flex-1 overflow-y-auto">
            <!-- Task name -->
            <div class="px-5 pt-5 pb-3">
                <label class="block text-xs font-medium text-slate-500 uppercase tracking-widest mb-2">Task name</label>
                <div class="px-3.5 py-2.5 border border-slate-200 rounded-xl text-sm font-medium text-slate-900 bg-white">
                    Refactor token validation
                </div>
            </div>

            <!-- Parent -->
            <div class="px-5 pb-5">
                <label class="block text-xs font-medium text-slate-500 uppercase tracking-widest mb-2">Parent</label>
                <button type="button" onclick="navigate('page-projects-browse', true)" class="w-full flex items-center gap-3 px-3.5 py-3 border border-slate-200 rounded-xl bg-white hover:bg-slate-50 transition-colors text-left">
                    <iconify-icon icon="solar:folder-linear" class="text-lg text-slate-600 shrink-0"></iconify-icon>
                    <div class="flex-1 min-w-0">
                        <div class="text-sm font-medium text-slate-900">Auth</div>
                        <div class="text-[11px] text-slate-500 mt-0.5">Nexus App › Time App › Auth</div>
                    </div>
                    <span class="text-xs font-medium text-[#F97316] shrink-0">Change</span>
                    <iconify-icon icon="solar:alt-arrow-right-linear" class="text-slate-400 shrink-0"></iconify-icon>
                </button>
            </div>

            <div class="h-px bg-slate-100 mx-5"></div>

            <!-- Date -->
            <div class="px-5 pt-5 pb-3">
                <div class="flex items-center justify-between mb-2">
                    <label class="block text-xs font-medium text-slate-500 uppercase tracking-widest">Date <span class="text-slate-400 normal-case font-normal">(optional)</span></label>
                    <button type="button" class="text-xs font-medium text-red-500 hover:text-red-600 transition-colors">Clear</button>
                </div>
                <div class="px-3.5 py-2.5 border border-slate-200 rounded-xl text-sm font-medium text-slate-900 text-center bg-white cursor-pointer hover:bg-slate-50 transition-colors">
                    Fri, Apr 17
                </div>
            </div>

            <!-- Time -->
            <div class="px-5 pb-5">
                <div class="flex items-center justify-between mb-2">
                    <label class="block text-xs font-medium text-slate-500 uppercase tracking-widest">Time <span class="text-slate-400 normal-case font-normal">(optional)</span></label>
                    <button type="button" class="text-xs font-medium text-red-500 hover:text-red-600 transition-colors">Clear</button>
                </div>
                <div class="flex gap-2.5">
                    <div class="flex-1 px-3.5 py-2.5 border border-slate-200 rounded-xl text-sm font-medium text-slate-900 text-center bg-white cursor-pointer hover:bg-slate-50 transition-colors">
                        2:00 PM
                    </div>
                    <div class="flex-1 px-3.5 py-2.5 border border-slate-200 rounded-xl text-sm font-medium text-slate-900 text-center bg-white cursor-pointer hover:bg-slate-50 transition-colors">
                        3:30 PM
                    </div>
                </div>
                <p class="text-[11px] text-slate-400 mt-1.5">Time requires a date to be set</p>
            </div>

            <div class="h-px bg-slate-100 mx-5"></div>

            <!-- Tags -->
            <div class="px-5 py-5">
                <label class="block text-xs font-medium text-slate-500 uppercase tracking-widest mb-2">Tags</label>
                <div class="flex flex-wrap gap-2">
                    <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-md bg-sky-50 text-sky-800 text-xs font-medium">
                        work
                        <button class="text-sky-400 hover:text-sky-600 text-sm leading-none" aria-label="Remove work tag">×</button>
                    </span>
                    <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-md bg-orange-100 text-[#F97316] text-xs font-medium">
                        urgent
                        <button class="text-orange-300 hover:text-[#F97316] text-sm leading-none" aria-label="Remove urgent tag">×</button>
                    </span>
                    <button class="px-2.5 py-1 rounded-md border border-slate-200 border-dashed text-slate-400 hover:text-slate-900 text-xs font-medium">+ add tag</button>
                </div>
            </div>

            <div class="h-px bg-slate-100 mx-5"></div>

            <!-- Notes -->
            <div class="px-5 py-5">
                <label class="block text-xs font-medium text-slate-500 uppercase tracking-widest mb-2">Notes</label>
                <div class="px-3.5 py-3 border border-slate-200 rounded-xl min-h-[80px] text-sm text-slate-600 leading-relaxed bg-white">
                    Need to handle the edge case where tokens were issued before the schema change. Sam suggested using a version column.
                </div>
            </div>

            <div class="h-px bg-slate-100 mx-5"></div>

            <!-- Delete -->
            <div class="px-5 py-5 pb-10">
                <button type="button" class="w-full flex items-center justify-center gap-2 py-3 border border-red-200 rounded-xl text-sm font-medium text-red-500 hover:bg-red-50 transition-colors">
                    <iconify-icon icon="solar:trash-bin-minimalistic-linear" class="text-base"></iconify-icon>
                    Delete task
                </button>
            </div>
        </main>
    </div>
