name: nx_time
description: Time tracking UI — Today tab (reference prototype).
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  dotted_border: ^3.1.0
  go_router: ^17.0.1
  google_fonts: ^8.0.2
  intl: ^0.20.2
  http: ^1.6.0
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1
  nx_db:
    path: ../nx_db
  flutter_riverpod: ^3.2.0
  graphql_flutter: ^5.1.2
  solar_icon_pack: ^0.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mocktail: ^1.0.4
  shared_preferences: ^2.2.2
  flutter_launcher_icons: ^0.14.4

# graphql_flutter 5.3.x resolves connectivity_plus ^7, whose iOS code uses
# NWPath.isUltraConstrained (Xcode / iOS SDK that defines it). Older Xcode
# fails with: Value of type 'NWPath' has no member 'isUltraConstrained'.
# Pin 6.1.5 until Xcode is upgraded or the plugin guards compile-time availability.
dependency_overrides:
  connectivity_plus: 6.1.5

flutter:
  uses-material-design: true

flutter_launcher_icons:
  ios: true
  android: false
  image_path: logo2.png
  remove_alpha_ios: true
