# Tag reference for `flutter test --tags …` / `--exclude-tags …`
# Library-level `@Tags([...])` + `library;` is required for Flutter to apply tags.
#
# Layout mirrors lib/src/: test/core/, test/auth/, test/kgql/{models,requests,documents,repositories,providers}, test/transcript/, test/widget/, test/integration/
#
# Examples:
#   flutter test --exclude-tags=integration
#   flutter test test/kgql/repositories --tags=repository
#   RUN_NX_DB_INTEGRATION=true flutter test test/integration
tags:
  unit:
    description: "Pure model / request / json-coercion tests"
  repository:
    description: "KGQL repositories with mocked GraphQLClient"
  provider:
    description: "Riverpod wiring around repositories"
  providers:
    description: "Deprecated alias for provider (same intent)"
  auth:
    description: "AuthController + prefs (mocked)"
  widget:
    description: "Widget tests (LoginPage)"
  integration:
    description: "Live GraphQL; also set RUN_NX_DB_INTEGRATION=true"
