name: nx_voice
description: Shared Nexus voice transport, microphone capture, Opus, and playback helpers.
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.0.0'

dependencies:
  flutter:
    sdk: flutter
  audioplayers: ^6.0.0
  opus_dart: ^3.0.1
  opus_flutter: ^3.0.3
  path_provider: ^2.1.1
  permission_handler: ^12.0.1
  record: ^6.1.2
  web_socket_channel: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
