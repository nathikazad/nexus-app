name: nx_people
description: Internal people graph UI for Nexus.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.2.0
  go_router: ^17.0.1
  google_fonts: ^8.0.2
  graphql_flutter: ^5.1.2
  nx_db:
    path: ../nx_db
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  shared_preferences: ^2.2.2

dependency_overrides:
  connectivity_plus: 6.1.5

flutter:
  uses-material-design: true
