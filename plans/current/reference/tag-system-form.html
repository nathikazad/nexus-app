<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tag System Form — Nx Expense UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .phone-mockup {
            position: relative;
            isolation: isolate;
        }
    </style>
</head>
<body class="bg-slate-100 font-sans antialiased text-slate-900 min-h-screen p-8 flex flex-wrap gap-10 justify-center items-start" style="font-family: 'Inter', sans-serif;">

    <div class="phone-mockup w-[375px] h-[812px] bg-white rounded-[2.5rem] border border-slate-200 shadow-xl overflow-hidden relative flex flex-col shrink-0">
            <!-- App Bar -->
            <div class="px-5 pt-3 pb-4 flex justify-between items-center border-b border-slate-100 bg-white relative z-10">
                <a href="tag-systems-list.html" class="text-slate-400 hover:text-slate-900 transition-colors -ml-2 p-2">
                    <iconify-icon icon="solar:arrow-left-linear" class="text-xl"></iconify-icon>
                </a>
                <h1 class="text-base font-semibold tracking-tight text-slate-900">Edit Tag System</h1>
                <a href="tag-systems-list.html" class="text-red-400 hover:text-red-600 transition-colors -mr-2 p-2" title="Delete (back to list)">
                    <iconify-icon icon="solar:trash-bin-trash-linear" class="text-lg"></iconify-icon>
                </a>
            </div>
    
            <div class="flex-1 overflow-y-auto p-5 space-y-8 no-scrollbar pb-32">
    
                <div class="space-y-6">
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 mb-1.5 uppercase tracking-wider">Name</label>
                        <input type="text" value="Category" class="block w-full px-4 py-3 border border-slate-200 rounded-xl text-sm focus:ring-1 focus:ring-teal-500 focus:border-teal-500 outline-none font-medium">
                    </div>
    
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 mb-2 uppercase tracking-wider">Selection Mode</label>
                        <div class="p-1 bg-slate-100 rounded-xl flex text-sm font-medium relative">
                            <div class="w-1/2 absolute inset-y-1 left-1 bg-white rounded-lg shadow-sm transition-transform"></div>
                            <button class="flex-1 py-2 text-center text-slate-900 relative z-10">Exclusive</button>
                            <button class="flex-1 py-2 text-center text-slate-500 relative z-10">Multiple</button>
                        </div>
                    </div>
    
                    <div class="flex items-center justify-between p-4 border border-slate-200 rounded-xl">
                        <label class="text-sm font-medium text-slate-700">Hierarchical (Tree)</label>
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" checked class="sr-only peer">
                            <div class="w-11 h-6 bg-slate-200 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-teal-600 shadow-inner"></div>
                        </label>
                    </div>
                </div>
    
                <!-- Nodes Editor (Tree) -->
                <div>
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Nodes Structure</h3>
                        <button class="text-xs font-semibold text-teal-600 hover:text-teal-700 flex items-center gap-1">
                            <iconify-icon icon="solar:add-circle-linear"></iconify-icon> Add Root
                        </button>
                    </div>
    
                    <div class="space-y-2 border-l-2 border-slate-100 ml-2 pl-2">
                        <!-- Node 1 -->
                        <div class="flex items-center gap-2 group">
                            <iconify-icon icon="solar:round-alt-arrow-right-linear" class="text-slate-300"></iconify-icon>
                            <input type="text" value="Food" class="flex-1 px-3 py-1.5 border border-slate-200 rounded-lg text-sm focus:border-teal-500 outline-none font-medium text-slate-900 bg-white">
                            <button class="text-slate-300 hover:text-teal-600"><iconify-icon icon="solar:add-circle-linear" class="text-lg"></iconify-icon></button>
                            <button class="text-slate-300 hover:text-red-500"><iconify-icon icon="solar:close-circle-linear" class="text-lg"></iconify-icon></button>
                        </div>
    
                        <!-- Child Nodes -->
                        <div class="space-y-2 border-l-2 border-slate-100 ml-6 pl-2">
                            <div class="flex items-center gap-2 group">
                                <div class="w-4 border-b-2 border-slate-100 mt-1"></div>
                                <input type="text" value="Fast Food" class="flex-1 px-3 py-1.5 border border-slate-200 rounded-lg text-sm focus:border-teal-500 outline-none font-medium text-slate-900 bg-white">
                                <button class="text-slate-300 hover:text-teal-600"><iconify-icon icon="solar:add-circle-linear" class="text-lg"></iconify-icon></button>
                                <button class="text-slate-300 hover:text-red-500"><iconify-icon icon="solar:close-circle-linear" class="text-lg"></iconify-icon></button>
                            </div>
                            <div class="flex items-center gap-2 group">
                                <div class="w-4 border-b-2 border-slate-100 mt-1"></div>
                                <input type="text" value="Groceries" class="flex-1 px-3 py-1.5 border border-slate-200 rounded-lg text-sm focus:border-teal-500 outline-none font-medium text-slate-900 bg-white">
                                <button class="text-slate-300 hover:text-teal-600"><iconify-icon icon="solar:add-circle-linear" class="text-lg"></iconify-icon></button>
                                <button class="text-slate-300 hover:text-red-500"><iconify-icon icon="solar:close-circle-linear" class="text-lg"></iconify-icon></button>
                            </div>
                        </div>
    
                        <!-- Node 2 -->
                        <div class="flex items-center gap-2 group mt-2">
                            <iconify-icon icon="solar:round-alt-arrow-right-linear" class="text-slate-300"></iconify-icon>
                            <input type="text" value="Transport" class="flex-1 px-3 py-1.5 border border-slate-200 rounded-lg text-sm focus:border-teal-500 outline-none font-medium text-slate-900 bg-white">
                            <button class="text-slate-300 hover:text-teal-600"><iconify-icon icon="solar:add-circle-linear" class="text-lg"></iconify-icon></button>
                            <button class="text-slate-300 hover:text-red-500"><iconify-icon icon="solar:close-circle-linear" class="text-lg"></iconify-icon></button>
                        </div>
                    </div>
                </div>
    
            </div>
    
            <!-- Save Button -->
            <div class="absolute bottom-0 w-full p-5 bg-white border-t border-slate-100 z-10 pb-8">
                <a href="tag-systems-list.html" class="block w-full text-center bg-teal-600 text-white rounded-xl py-3.5 text-sm font-semibold shadow-sm hover:bg-teal-700 transition-colors">
                    Save System
                </a>
            </div>
        </div>

</body>
</html>
