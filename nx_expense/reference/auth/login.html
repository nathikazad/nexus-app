<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Nx Expense UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .phone-mockup {
            position: relative;
            isolation: isolate;
        }
    </style>
</head>
<body class="bg-slate-100 font-sans antialiased text-slate-900 min-h-screen p-8 flex flex-wrap gap-10 justify-center items-start" style="font-family: 'Inter', sans-serif;">

    <div class="phone-mockup w-[375px] h-[812px] bg-white rounded-[2.5rem] border border-slate-200 shadow-xl overflow-hidden relative flex flex-col shrink-0">
            <div class="flex-1 flex flex-col justify-center px-8">
                <div class="text-center mb-12">
                    <div class="w-16 h-16 bg-teal-600 text-white rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-sm">
                        <iconify-icon icon="solar:wallet-money-linear" class="text-3xl"></iconify-icon>
                    </div>
                    <h1 class="text-2xl font-semibold tracking-tight text-slate-900">Nx Expense</h1>
                    <p class="text-sm text-slate-500 mt-2">Track your spending privately.</p>
                </div>
    
                <form class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 mb-1.5 uppercase tracking-wider">User ID</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                                <iconify-icon icon="solar:user-linear"></iconify-icon>
                            </div>
                            <input type="text" value="1" class="block w-full pl-10 pr-3 py-3 border border-slate-200 rounded-xl text-sm focus:ring-1 focus:ring-teal-500 focus:border-teal-500 outline-none bg-slate-50 focus:bg-white transition-colors" placeholder="Enter user ID">
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 mb-1.5 uppercase tracking-wider">Backend</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                                <iconify-icon icon="solar:server-linear"></iconify-icon>
                            </div>
                            <select class="block w-full pl-10 pr-3 py-3 border border-slate-200 rounded-xl text-sm focus:ring-1 focus:ring-teal-500 focus:border-teal-500 outline-none bg-slate-50 focus:bg-white transition-colors appearance-none">
                                <option>Production</option>
                                <option>Local</option>
                                <option>Custom</option>
                            </select>
                            <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none text-slate-400">
                                <iconify-icon icon="solar:alt-arrow-down-linear"></iconify-icon>
                            </div>
                        </div>
                    </div>
    
                    <a href="../list/expense-list-main.html" class="block w-full text-center bg-teal-600 text-white rounded-xl py-3.5 text-sm font-semibold shadow-sm hover:bg-teal-700 transition-colors mt-4">
                        Log In
                    </a>
                </form>
            </div>
        </div>

</body>
</html>
