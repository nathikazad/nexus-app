<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense List — Filter Bottom Sheet open — Nx Expense UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .phone-mockup {
            position: relative;
            isolation: isolate;
        }
    </style>
</head>
<body class="bg-slate-100 font-sans antialiased text-slate-900 min-h-screen p-8 flex flex-wrap gap-10 justify-center items-start" style="font-family: 'Inter', sans-serif;">

    <div class="phone-mockup w-[375px] h-[812px] bg-white rounded-[2.5rem] border border-slate-200 shadow-xl overflow-hidden relative flex flex-col shrink-0">
            <!-- App Bar -->
            <div class="px-5 pt-3 pb-4 flex justify-between items-center bg-white z-10 relative">
                <h1 class="text-xl font-semibold tracking-tight">Expenses</h1>
                <div class="flex gap-4 text-slate-400">
                    <a href="../dashboard/dashboard.html" class="hover:text-teal-600 transition-colors"><iconify-icon icon="solar:calendar-linear" class="text-xl"></iconify-icon></a>
                    <a href="../tags/tag-systems-list.html" class="hover:text-slate-900 transition-colors"><iconify-icon icon="solar:settings-linear" class="text-xl"></iconify-icon></a>
                    <a href="../auth/login.html" class="hover:text-slate-900 transition-colors"><iconify-icon icon="solar:logout-2-linear" class="text-xl"></iconify-icon></a>
                </div>
            </div>
    
            <!-- Month/Year Selector -->
            <div class="px-5 pb-2 flex items-center gap-3 relative z-10">
                <button class="flex items-center gap-1 text-sm font-semibold text-slate-900 bg-slate-100 px-3 py-1.5 rounded-xl shrink-0">
                    2026 <iconify-icon icon="solar:alt-arrow-down-linear" class="text-slate-500"></iconify-icon>
                </button>
                <div class="flex gap-2 overflow-x-auto no-scrollbar min-h-10 items-center">
                    <button class="px-3 py-1.5 rounded-full text-xs font-semibold bg-white text-slate-600 border border-slate-200 shrink-0">Mar</button>
                    <button class="px-3 py-1.5 rounded-full text-xs font-semibold bg-teal-600 text-white shrink-0 shadow-sm border border-teal-600">Apr</button>
                    <button class="px-3 py-1.5 rounded-full text-xs font-semibold bg-white text-slate-600 border border-slate-200 shrink-0">May</button>
                </div>
            </div>
    
            <!-- Summary + Filter/Sort icons (filter icon is teal = active) -->
            <div class="px-5 pb-3 pt-1 flex items-center justify-between">
                <p class="text-sm text-slate-500 font-medium">5 &middot; $420.00</p>
                <div class="flex items-center gap-3">
                    <a href="expense-list-search-open.html" class="text-slate-400 hover:text-teal-600 transition-colors" title="Search">
                        <iconify-icon icon="solar:magnifer-linear" class="text-lg"></iconify-icon>
                    </a>
                    <a href="expense-list-select.html" class="text-slate-400 hover:text-teal-600 transition-colors" title="Select expenses">
                        <iconify-icon icon="solar:checklist-minimalistic-linear" class="text-lg"></iconify-icon>
                    </a>
                    <a href="expense-list-main.html" class="text-teal-600 relative" title="Close filters">
                        <iconify-icon icon="solar:filter-bold" class="text-lg"></iconify-icon>
                        <!-- Active badge -->
                        <span class="absolute -top-1 -right-1.5 w-3.5 h-3.5 bg-teal-600 text-white text-[8px] font-bold rounded-full flex items-center justify-center">2</span>
                    </a>
                    <a href="expense-list-sort-bottom-sheet-open.html" class="text-slate-400 hover:text-teal-600 transition-colors">
                        <iconify-icon icon="solar:sort-from-top-to-bottom-linear" class="text-lg"></iconify-icon>
                    </a>
                </div>
            </div>
    
            <!-- Active filter chips (dismissible) -->
            <div class="px-5 pb-3 flex gap-2 overflow-x-auto no-scrollbar min-h-10 items-center">
                <span class="inline-flex items-center gap-1 px-2.5 py-1 bg-teal-50 text-teal-700 rounded-lg text-xs font-medium border border-teal-200 shrink-0">
                    Category: Food
                    <button class="text-teal-400 hover:text-teal-700"><iconify-icon icon="solar:close-circle-linear" class="text-sm"></iconify-icon></button>
                </span>
                <span class="inline-flex items-center gap-1 px-2.5 py-1 bg-teal-50 text-teal-700 rounded-lg text-xs font-medium border border-teal-200 shrink-0">
                    Min $50
                    <button class="text-teal-400 hover:text-teal-700"><iconify-icon icon="solar:close-circle-linear" class="text-sm"></iconify-icon></button>
                </span>
                <button class="text-xs font-medium text-slate-400 hover:text-red-500 shrink-0 ml-1">Clear all</button>
            </div>
    
            <!-- Dimmed list behind sheet -->
            <div class="flex-1 bg-slate-50/50 opacity-40 px-5 pt-2 space-y-2">
                <div class="pt-2 pb-1"><p class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Apr 15, 2026</p></div>
                <a href="../expense/expense-detail.html" class="block bg-white p-4 rounded-2xl border border-slate-100"><div class="flex justify-between"><h3 class="text-sm font-semibold text-slate-900">Starbucks Coffee</h3><span class="text-sm font-semibold text-teal-600">$54.50</span></div></a>
            </div>
    
            <!-- Bottom Nav -->
            <div class="absolute bottom-0 w-full h-20 bg-white border-t border-slate-100 flex items-center px-6 pb-4 pt-2 z-20">
                <a href="expense-list-main.html" class="flex-1 flex flex-col items-center justify-center gap-1.5 text-teal-600">
                    <iconify-icon icon="solar:wallet-money-linear" class="text-[22px]"></iconify-icon>
                    <span class="text-xs font-semibold">Expenses</span>
                </a>
                <a href="../dashboard/dashboard.html" class="flex-1 flex flex-col items-center justify-center gap-1.5 text-slate-400 hover:text-slate-600 transition-colors">
                    <iconify-icon icon="solar:widget-5-linear" class="text-[22px]"></iconify-icon>
                    <span class="text-xs font-medium">Dashboard</span>
                </a>
            </div>
    
            <!-- Filter Bottom Sheet Overlay -->
            <div class="absolute inset-0 z-30 flex flex-col justify-end pointer-events-none">
                <a href="expense-list-main.html" class="absolute inset-0 z-20 bg-slate-900/40 pointer-events-auto" aria-label="Close filters"></a>
                <div class="relative z-30 bg-white w-full h-[75%] rounded-t-3xl shadow-2xl flex flex-col pointer-events-auto">
                    <!-- Handle -->
                    <div class="flex justify-center pt-3 pb-2">
                        <div class="w-12 h-1.5 bg-slate-200 rounded-full"></div>
                    </div>
                    <!-- Header -->
                    <div class="px-5 py-2 flex justify-between items-center border-b border-slate-100">
                        <h2 class="text-base font-semibold text-slate-900">Filters</h2>
                        <div class="flex items-center gap-4">
                            <a href="expense-list-main.html" class="text-xs font-medium text-slate-400 hover:text-red-500">Reset</a>
                            <a href="expense-list-main.html" class="text-sm font-semibold text-teal-600 hover:text-teal-700">Apply</a>
                        </div>
                    </div>
    
                    <!-- Filter content (scrollable) -->
                    <div class="flex-1 overflow-y-auto p-5 space-y-6 no-scrollbar">
    
                        <!-- Tag System: Category (hierarchical) -->
                        <div>
                            <button class="w-full flex items-center justify-between mb-3">
                                <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Category</h3>
                                <iconify-icon icon="solar:alt-arrow-down-linear" class="text-slate-400"></iconify-icon>
                            </button>
                            <div class="space-y-1 border-l-2 border-slate-100 ml-1 pl-3">
                                <!-- Root: Food (selected) -->
                                <label class="flex items-center gap-3 py-2 cursor-pointer">
                                    <input type="checkbox" checked class="appearance-none w-5 h-5 rounded border-2 border-slate-300 checked:bg-teal-600 checked:border-teal-600 relative after:content-[''] after:absolute after:top-[3px] after:left-[6px] after:w-[5px] after:h-[9px] after:border-white after:border-r-2 after:border-b-2 after:rotate-45 after:opacity-0 checked:after:opacity-100 transition-all">
                                    <span class="text-sm font-semibold text-slate-900">Food</span>
                                </label>
                                <!-- Children (indented) -->
                                <div class="ml-5 space-y-1 border-l-2 border-slate-100 pl-3">
                                    <label class="flex items-center gap-3 py-1.5 cursor-pointer">
                                        <input type="checkbox" checked class="appearance-none w-4 h-4 rounded border-2 border-slate-300 checked:bg-teal-600 checked:border-teal-600 relative after:content-[''] after:absolute after:top-[2px] after:left-[5px] after:w-[4px] after:h-[7px] after:border-white after:border-r-2 after:border-b-2 after:rotate-45 after:opacity-0 checked:after:opacity-100 transition-all">
                                        <span class="text-sm text-slate-700">Fast Food</span>
                                    </label>
                                    <label class="flex items-center gap-3 py-1.5 cursor-pointer">
                                        <input type="checkbox" checked class="appearance-none w-4 h-4 rounded border-2 border-slate-300 checked:bg-teal-600 checked:border-teal-600 relative after:content-[''] after:absolute after:top-[2px] after:left-[5px] after:w-[4px] after:h-[7px] after:border-white after:border-r-2 after:border-b-2 after:rotate-45 after:opacity-0 checked:after:opacity-100 transition-all">
                                        <span class="text-sm text-slate-700">Groceries</span>
                                    </label>
                                    <label class="flex items-center gap-3 py-1.5 cursor-pointer">
                                        <input type="checkbox" class="appearance-none w-4 h-4 rounded border-2 border-slate-300 checked:bg-teal-600 checked:border-teal-600 relative after:content-[''] after:absolute after:top-[2px] after:left-[5px] after:w-[4px] after:h-[7px] after:border-white after:border-r-2 after:border-b-2 after:rotate-45 after:opacity-0 checked:after:opacity-100 transition-all">
                                        <span class="text-sm text-slate-700">Restaurants</span>
                                    </label>
                                </div>
                                <!-- Root: Transport (collapsed) -->
                                <label class="flex items-center gap-3 py-2 cursor-pointer">
                                    <input type="checkbox" class="appearance-none w-5 h-5 rounded border-2 border-slate-300 checked:bg-teal-600 checked:border-teal-600 relative after:content-[''] after:absolute after:top-[3px] after:left-[6px] after:w-[5px] after:h-[9px] after:border-white after:border-r-2 after:border-b-2 after:rotate-45 after:opacity-0 checked:after:opacity-100 transition-all">
                                    <span class="text-sm font-semibold text-slate-900">Transport</span>
                                    <iconify-icon icon="solar:alt-arrow-right-linear" class="text-slate-300 text-sm ml-auto"></iconify-icon>
                                </label>
                                <!-- Root: Housing (collapsed) -->
                                <label class="flex items-center gap-3 py-2 cursor-pointer">
                                    <input type="checkbox" class="appearance-none w-5 h-5 rounded border-2 border-slate-300 checked:bg-teal-600 checked:border-teal-600 relative after:content-[''] after:absolute after:top-[3px] after:left-[6px] after:w-[5px] after:h-[9px] after:border-white after:border-r-2 after:border-b-2 after:rotate-45 after:opacity-0 checked:after:opacity-100 transition-all">
                                    <span class="text-sm font-semibold text-slate-900">Housing</span>
                                    <iconify-icon icon="solar:alt-arrow-right-linear" class="text-slate-300 text-sm ml-auto"></iconify-icon>
                                </label>
                                <!-- Root: Entertainment -->
                                <label class="flex items-center gap-3 py-2 cursor-pointer">
                                    <input type="checkbox" class="appearance-none w-5 h-5 rounded border-2 border-slate-300 checked:bg-teal-600 checked:border-teal-600 relative after:content-[''] after:absolute after:top-[3px] after:left-[6px] after:w-[5px] after:h-[9px] after:border-white after:border-r-2 after:border-b-2 after:rotate-45 after:opacity-0 checked:after:opacity-100 transition-all">
                                    <span class="text-sm font-semibold text-slate-900">Entertainment</span>
                                </label>
                            </div>
                        </div>
    
                        <!-- Divider -->
                        <div class="border-t border-slate-100"></div>
    
                        <!-- Tag System: Priority (flat) -->
                        <div>
                            <button class="w-full flex items-center justify-between mb-3">
                                <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Priority</h3>
                                <iconify-icon icon="solar:alt-arrow-down-linear" class="text-slate-400"></iconify-icon>
                            </button>
                            <div class="flex flex-wrap gap-2">
                                <label class="cursor-pointer">
                                    <input type="checkbox" class="sr-only peer">
                                    <span class="px-3 py-1.5 rounded-lg text-xs font-medium border border-slate-200 bg-white text-slate-600 peer-checked:bg-teal-600 peer-checked:text-white peer-checked:border-teal-600 inline-block transition-colors">Low</span>
                                </label>
                                <label class="cursor-pointer">
                                    <input type="checkbox" class="sr-only peer">
                                    <span class="px-3 py-1.5 rounded-lg text-xs font-medium border border-slate-200 bg-white text-slate-600 peer-checked:bg-teal-600 peer-checked:text-white peer-checked:border-teal-600 inline-block transition-colors">Medium</span>
                                </label>
                                <label class="cursor-pointer">
                                    <input type="checkbox" checked class="sr-only peer">
                                    <span class="px-3 py-1.5 rounded-lg text-xs font-medium border border-teal-600 bg-teal-600 text-white inline-block transition-colors">High</span>
                                </label>
                            </div>
                        </div>
    
                        <!-- Divider -->
                        <div class="border-t border-slate-100"></div>
    
                        <!-- Amount filter -->
                        <div>
                            <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3">Amount</h3>
                            <div class="flex items-center gap-3">
                                <div class="flex-1">
                                    <label class="block text-xs text-slate-400 mb-1.5">Min</label>
                                    <div class="relative">
                                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm font-medium">$</span>
                                        <input type="number" value="50" class="w-full pl-7 pr-3 py-2.5 border border-slate-200 rounded-xl text-sm font-medium text-slate-900 focus:border-teal-500 focus:ring-1 focus:ring-teal-500 outline-none">
                                    </div>
                                </div>
                                <div class="flex-1">
                                    <label class="block text-xs text-slate-400 mb-1.5">Max</label>
                                    <div class="relative">
                                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm font-medium">$</span>
                                        <input type="number" placeholder="No limit" class="w-full pl-7 pr-3 py-2.5 border border-slate-200 rounded-xl text-sm font-medium text-slate-900 focus:border-teal-500 focus:ring-1 focus:ring-teal-500 outline-none placeholder:text-slate-300">
                                    </div>
                                </div>
                            </div>
                        </div>
    
                        <!-- Divider -->
                        <div class="border-t border-slate-100"></div>
    
                        <!-- Relation: Company -->
                        <div>
                            <button class="w-full flex items-center justify-between mb-3">
                                <div class="flex items-center gap-2">
                                    <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Company</h3>
                                    <span class="w-4 h-4 bg-teal-600 text-white text-[9px] font-bold rounded-full flex items-center justify-center">1</span>
                                </div>
                                <iconify-icon icon="solar:alt-arrow-down-linear" class="text-slate-400"></iconify-icon>
                            </button>
                            <!-- Search input -->
                            <div class="relative mb-3">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                                    <iconify-icon icon="solar:magnifer-linear" class="text-sm"></iconify-icon>
                                </div>
                                <input type="text" class="block w-full pl-9 pr-3 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:bg-white focus:ring-1 focus:ring-teal-500 focus:border-teal-500 outline-none" placeholder="Search companies...">
                            </div>
                            <!-- Selected chips -->
                            <div class="flex flex-wrap gap-1.5 mb-3">
                                <span class="inline-flex items-center gap-1 px-2.5 py-1 bg-teal-50 text-teal-700 rounded-lg text-xs font-medium border border-teal-200">
                                    Starbucks Corp
                                    <button class="text-teal-400 hover:text-teal-700"><iconify-icon icon="solar:close-circle-linear" class="text-sm"></iconify-icon></button>
                                </span>
                            </div>
                            <!-- Candidate list -->
                            <div class="bg-white border border-slate-100 rounded-xl overflow-hidden max-h-32 overflow-y-auto no-scrollbar">
                                <button class="w-full px-3 py-2.5 text-left text-sm text-slate-700 font-medium hover:bg-slate-50 transition-colors border-b border-slate-50">Uber Technologies</button>
                                <button class="w-full px-3 py-2.5 text-left text-sm text-slate-700 font-medium hover:bg-slate-50 transition-colors border-b border-slate-50">Whole Foods</button>
                                <button class="w-full px-3 py-2.5 text-left text-sm text-slate-700 font-medium hover:bg-slate-50 transition-colors">Amazon Inc</button>
                            </div>
                        </div>
    
                        <!-- Divider -->
                        <div class="border-t border-slate-100"></div>
    
                        <!-- Relation: Project -->
                        <div>
                            <button class="w-full flex items-center justify-between mb-3">
                                <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Project</h3>
                                <iconify-icon icon="solar:alt-arrow-down-linear" class="text-slate-400"></iconify-icon>
                            </button>
                            <!-- Search input -->
                            <div class="relative mb-3">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                                    <iconify-icon icon="solar:magnifer-linear" class="text-sm"></iconify-icon>
                                </div>
                                <input type="text" class="block w-full pl-9 pr-3 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:bg-white focus:ring-1 focus:ring-teal-500 focus:border-teal-500 outline-none" placeholder="Search projects...">
                            </div>
                            <!-- No selection yet — just show candidates -->
                            <div class="bg-white border border-slate-100 rounded-xl overflow-hidden max-h-32 overflow-y-auto no-scrollbar">
                                <button class="w-full px-3 py-2.5 text-left text-sm text-slate-700 font-medium hover:bg-slate-50 transition-colors border-b border-slate-50">Q3 Marketing</button>
                                <button class="w-full px-3 py-2.5 text-left text-sm text-slate-700 font-medium hover:bg-slate-50 transition-colors border-b border-slate-50">Office Renovation</button>
                                <button class="w-full px-3 py-2.5 text-left text-sm text-slate-700 font-medium hover:bg-slate-50 transition-colors">R&D Initiative</button>
                            </div>
                        </div>
    
                    </div>
                </div>
            </div>
        </div>

</body>
</html>
