<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense List — Bulk apply sheet — Nx Expense UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .phone-mockup {
            position: relative;
            isolation: isolate;
        }
    </style>
</head>
<body class="bg-slate-100 font-sans antialiased text-slate-900 min-h-screen p-8 flex flex-wrap gap-10 justify-center items-start" style="font-family: 'Inter', sans-serif;">

    <div class="phone-mockup w-[375px] h-[812px] bg-white rounded-[2.5rem] border border-slate-200 shadow-xl overflow-hidden relative flex flex-col shrink-0">
        <!-- Dimmed selection screen behind sheet -->
        <div class="absolute inset-0 flex flex-col opacity-40 pointer-events-none">
            <div class="px-3 pt-3 pb-3 flex items-center gap-1 bg-white border-b border-slate-100">
                <span class="p-2 w-9"></span>
                <h1 class="flex-1 text-center text-base font-semibold text-slate-900 pr-2">2 selected</h1>
                <span class="text-sm font-semibold text-teal-600 px-2 py-2">Select all</span>
            </div>
            <div class="flex-1 bg-slate-50/50 px-5 pt-2 space-y-2">
                <div class="pt-1 pb-1"><p class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Apr 15, 2026</p></div>
                <div class="bg-white p-4 rounded-2xl border-2 border-teal-500 flex gap-3">
                    <span class="w-5 h-5 rounded border-2 border-teal-600 bg-teal-600 shrink-0"></span>
                    <div class="flex-1"><div class="flex justify-between"><span class="text-sm font-semibold">Starbucks Coffee</span><span class="text-sm font-semibold text-teal-600">$4.50</span></div></div>
                </div>
            </div>
        </div>

        <div class="absolute bottom-0 w-full h-20 bg-white border-t border-slate-100 flex items-center px-6 pb-4 pt-2 z-20 opacity-40">
            <div class="flex-1 flex flex-col items-center gap-1.5 text-teal-600">
                <iconify-icon icon="solar:wallet-money-linear" class="text-[22px]"></iconify-icon>
                <span class="text-xs font-semibold">Expenses</span>
            </div>
            <div class="flex-1 flex flex-col items-center gap-1.5 text-slate-400">
                <iconify-icon icon="solar:widget-5-linear" class="text-[22px]"></iconify-icon>
                <span class="text-xs font-medium">Dashboard</span>
            </div>
        </div>

        <!-- Bottom sheet -->
        <div class="absolute inset-0 z-30 flex flex-col justify-end pointer-events-none">
            <a href="expense-list-select.html" class="absolute inset-0 z-20 bg-slate-900/40 pointer-events-auto" aria-label="Close"></a>
            <div class="relative z-30 bg-white w-full rounded-t-3xl shadow-2xl flex flex-col pointer-events-auto max-h-[55%]">
                <div class="flex justify-center pt-3 pb-2">
                    <div class="w-12 h-1.5 bg-slate-200 rounded-full"></div>
                </div>
                <div class="px-5 py-2 border-b border-slate-100">
                    <p class="text-xs font-medium text-slate-400 uppercase tracking-wider">Apply to 2 expenses</p>
                    <h2 class="text-base font-semibold text-slate-900 mt-0.5">Choose what to set</h2>
                </div>
                <div class="p-3 pb-8 space-y-1 overflow-y-auto no-scrollbar">
                    <a href="../tags/select-tag.html" class="flex items-center gap-4 p-4 rounded-2xl hover:bg-slate-50 transition-colors border border-transparent hover:border-slate-100">
                        <span class="w-10 h-10 rounded-xl bg-teal-50 text-teal-600 flex items-center justify-center shrink-0">
                            <iconify-icon icon="solar:tag-horizontal-linear" class="text-xl"></iconify-icon>
                        </span>
                        <span class="flex-1 min-w-0">
                            <span class="block text-sm font-semibold text-slate-900">Tag</span>
                            <span class="block text-xs text-slate-500 mt-0.5">Category, priority, or any tag system</span>
                        </span>
                        <iconify-icon icon="solar:alt-arrow-right-linear" class="text-slate-300 text-xl shrink-0"></iconify-icon>
                    </a>
                    <a href="../relations/select-relation.html" class="flex items-center gap-4 p-4 rounded-2xl hover:bg-slate-50 transition-colors border border-transparent hover:border-slate-100">
                        <span class="w-10 h-10 rounded-xl bg-slate-100 text-slate-600 flex items-center justify-center shrink-0">
                            <iconify-icon icon="solar:buildings-2-linear" class="text-xl"></iconify-icon>
                        </span>
                        <span class="flex-1 min-w-0">
                            <span class="block text-sm font-semibold text-slate-900">Company or project</span>
                            <span class="block text-xs text-slate-500 mt-0.5">Relations linked to transactions</span>
                        </span>
                        <iconify-icon icon="solar:alt-arrow-right-linear" class="text-slate-300 text-xl shrink-0"></iconify-icon>
                    </a>
                    <a href="../tags/tag-browser-screen.html" class="flex items-center gap-4 p-4 rounded-2xl hover:bg-slate-50 transition-colors border border-transparent hover:border-slate-100">
                        <span class="w-10 h-10 rounded-xl bg-slate-100 text-slate-600 flex items-center justify-center shrink-0">
                            <iconify-icon icon="solar:slider-horizontal-linear" class="text-xl"></iconify-icon>
                        </span>
                        <span class="flex-1 min-w-0">
                            <span class="block text-sm font-semibold text-slate-900">Attribute</span>
                            <span class="block text-xs text-slate-500 mt-0.5">Pick a tag system, then a value</span>
                        </span>
                        <iconify-icon icon="solar:alt-arrow-right-linear" class="text-slate-300 text-xl shrink-0"></iconify-icon>
                    </a>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
