name: nx_notes
description: Internal notes and essay editor for Nexus.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.9.2

dependencies:
  auto_size_text: ^3.0.0
  appflowy_editor:
    path: ../appflowy-editor
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.2.0
  file_picker: ^10.3.10
  go_router: ^17.0.1
  google_fonts: ^8.0.2
  graphql_flutter: ^5.1.2
  http: ^1.2.2
  intl: ^0.20.2
  nx_db:
    path: ../nx_db
  provider: ^6.1.5+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mocktail: ^1.0.4
  shared_preferences: ^2.2.2

dependency_overrides:
  connectivity_plus: 6.1.5

flutter:
  uses-material-design: true
