<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home (Tab Shell) — Nexus App UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-100 p-4 md:p-8 font-sans text-gray-900 antialiased selection:bg-orange-100 selection:text-orange-900">

    <div class="flex flex-wrap justify-center gap-10 items-start">
            <div class="relative w-full max-w-[375px] h-[812px] bg-gray-50 rounded-[2.5rem] shadow-2xl overflow-hidden border-[6px] border-gray-900 flex flex-col">
                <div class="bg-white px-5 pt-14 pb-3 flex items-center justify-between border-b border-gray-100 z-10">
                    <h1 class="text-xl font-medium tracking-tight text-gray-900">Nexus</h1>
                    <a href="../auth/login.html" class="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center text-gray-600 hover:bg-gray-200 transition-colors" title="Account / sign out">
                        <i data-lucide="user" class="w-4 h-4" stroke-width="1.5"></i>
                    </a>
                </div>

                <div class="flex-1 flex items-center justify-center bg-gray-50/50">
                    <p class="text-base text-gray-400">Tab Content Area</p>
                </div>

                <div class="absolute bottom-24 right-5 z-20">
                    <a href="../assistant/nexus-ai.html" class="w-14 h-14 bg-orange-600 rounded-2xl shadow-lg shadow-orange-600/30 flex items-center justify-center text-white active:scale-95 transition-transform" title="Nexus AI">
                        <i data-lucide="mic" class="w-6 h-6" stroke-width="1.5"></i>
                    </a>
                </div>

                <div class="bg-white border-t border-gray-100 pb-8 pt-3 px-6 flex justify-between items-center z-10">
                    <a href="../hardware/hardware.html" class="flex flex-col items-center gap-1 text-orange-600 no-underline" title="Hardware">
                        <i data-lucide="cpu" class="w-6 h-6" stroke-width="1.5"></i>
                        <span class="text-xs font-medium">Hardware</span>
                    </a>
                    <a href="../navigator/model-types.html" class="flex flex-col items-center gap-1 text-gray-400 hover:text-gray-600 no-underline" title="Navigator">
                        <i data-lucide="layout-grid" class="w-6 h-6" stroke-width="1.5"></i>
                        <span class="text-xs font-medium">Navigator</span>
                    </a>
                    <a href="../logs/log-viewer.html" class="flex flex-col items-center gap-1 text-gray-400 hover:text-gray-600 no-underline" title="Logs">
                        <i data-lucide="terminal-square" class="w-6 h-6" stroke-width="1.5"></i>
                        <span class="text-xs font-medium">Logs</span>
                    </a>
                    <a href="../data/data-home.html" class="flex flex-col items-center gap-1 text-gray-400 hover:text-gray-600 no-underline" title="Data">
                        <i data-lucide="database" class="w-6 h-6" stroke-width="1.5"></i>
                        <span class="text-xs font-medium">Data</span>
                    </a>
                </div>
            </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
