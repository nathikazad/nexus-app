<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Images viewer — Nexus App UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        input[type=range] {
            -webkit-appearance: none;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 1.25rem;
            width: 1.25rem;
            border-radius: 9999px;
            background: #ffffff;
            border: 2px solid #ea580c;
            cursor: pointer;
            margin-top: -0.375rem;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 0.5rem;
            cursor: pointer;
            background: #e5e7eb;
            border-radius: 9999px;
        }
    </style>
</head>
<body class="bg-gray-100 p-4 md:p-8 font-sans text-gray-900 antialiased selection:bg-orange-100 selection:text-orange-900">

    <div class="flex flex-wrap justify-center gap-10 items-start">
            <div class="relative w-full max-w-[375px] h-[812px] bg-black rounded-[2.5rem] shadow-2xl overflow-hidden border-[6px] border-gray-900 flex flex-col">
                <div class="px-4 pt-14 pb-4 flex items-center justify-between z-10 bg-gradient-to-b from-black/80 to-transparent absolute top-0 w-full">
                    <div class="flex items-center gap-2">
                        <a href="data-home.html" class="w-10 h-10 rounded-full flex items-center justify-center text-white bg-black/40 backdrop-blur-md" title="Back to Data">
                            <i data-lucide="arrow-left" class="w-5 h-5" stroke-width="1.5"></i>
                        </a>
                        <button class="px-4 py-2 rounded-full bg-black/40 backdrop-blur-md text-white text-sm font-medium flex items-center gap-2">
                            <span>Today</span>
                            <i data-lucide="calendar" class="w-4 h-4" stroke-width="1.5"></i>
                        </button>
                    </div>
                </div>

                <div class="flex-1 bg-gray-900 flex items-center justify-center relative">
                    <img src="https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&q=80&w=800&h=1200" class="w-full h-full object-cover opacity-80" alt="Capture">
                    
                    <div class="absolute bottom-32 left-4 right-4 text-white drop-shadow-md">
                        <h2 class="text-3xl font-medium tracking-tight mb-1">14:32:45</h2>
                        <div class="flex items-center gap-2 text-sm text-gray-300">
                            <i data-lucide="terminal" class="w-4 h-4" stroke-width="1.5"></i>
                            <span>VS Code</span>
                            <span class="mx-1">•</span>
                            <span class="font-mono text-xs">img_143245.jpg</span>
                        </div>
                    </div>
                </div>

                <div class="bg-gray-950 px-5 pt-4 pb-10 z-10 absolute bottom-0 w-full border-t border-gray-800">
                    <div class="flex items-center justify-between mb-6">
                        <button class="w-12 h-12 rounded-full bg-gray-800 flex items-center justify-center text-white active:bg-gray-700">
                            <i data-lucide="chevron-left" class="w-6 h-6" stroke-width="1.5"></i>
                        </button>
                        
                        <div class="flex-1 px-4">
                            <div class="relative w-full h-12 flex items-center">
                                <div class="absolute w-full h-1.5 bg-gray-800 rounded-full"></div>
                                <div class="absolute w-full h-full flex items-center justify-between px-1">
                                    <div class="w-1 h-1.5 bg-gray-600 rounded-full"></div>
                                    <div class="w-1 h-1.5 bg-gray-600 rounded-full"></div>
                                    <div class="w-1 h-1.5 bg-orange-600 rounded-full"></div>
                                    <div class="w-1 h-1.5 bg-gray-600 rounded-full"></div>
                                    <div class="w-1 h-1.5 bg-gray-600 rounded-full"></div>
                                </div>
                                <input type="range" min="0" max="100" value="50" class="absolute w-full z-10">
                            </div>
                        </div>

                        <button class="w-12 h-12 rounded-full bg-gray-800 flex items-center justify-center text-white active:bg-gray-700">
                            <i data-lucide="chevron-right" class="w-6 h-6" stroke-width="1.5"></i>
                        </button>
                    </div>
                </div>
            </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
