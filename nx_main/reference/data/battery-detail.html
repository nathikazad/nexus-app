<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Necklace battery — Nexus App UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-100 p-4 md:p-8 font-sans text-gray-900 antialiased selection:bg-orange-100 selection:text-orange-900">

    <div class="flex flex-wrap justify-center gap-10 items-start">
            <div class="relative w-full max-w-[375px] h-[812px] bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border-[6px] border-gray-900 flex flex-col">
                <div class="px-5 pt-14 pb-4 flex items-center justify-between border-b border-gray-100 z-10">
                    <div class="flex items-center gap-3">
                        <a href="data-home.html" class="w-10 h-10 -ml-2 rounded-full flex items-center justify-center text-gray-900 hover:bg-gray-50" title="Back to Data">
                            <i data-lucide="arrow-left" class="w-5 h-5" stroke-width="1.5"></i>
                        </a>
                        <h1 class="text-xl font-medium tracking-tight text-gray-900">Necklace battery</h1>
                    </div>
                </div>

                <div class="p-5 flex-1 overflow-y-auto no-scrollbar">
                    <button class="w-full flex items-center justify-between px-4 py-3 bg-gray-50 rounded-xl border border-gray-200 mb-8">
                        <span class="text-base font-medium text-gray-900">Today, Oct 24</span>
                        <i data-lucide="calendar" class="w-4 h-4 text-gray-500" stroke-width="1.5"></i>
                    </button>

                    <div class="w-full h-64 mb-8 relative">
                        <div class="absolute left-0 top-0 bottom-6 flex flex-col justify-between text-xs text-gray-400 font-mono">
                            <span>100%</span><span>75%</span><span>50%</span><span>25%</span><span>0%</span>
                        </div>
                        <div class="absolute right-0 top-0 bottom-6 flex flex-col justify-between text-xs text-gray-400 font-mono text-right">
                            <span>4.2v</span><span>3.9v</span><span>3.6v</span><span>3.3v</span><span>3.0v</span>
                        </div>
                        
                        <div class="absolute left-10 right-10 top-2 bottom-6 border-b border-l border-gray-200 relative">
                            <div class="absolute w-full top-1/4 border-t border-gray-100 border-dashed"></div>
                            <div class="absolute w-full top-2/4 border-t border-gray-100 border-dashed"></div>
                            <div class="absolute w-full top-3/4 border-t border-gray-100 border-dashed"></div>
                            
                            <svg class="absolute inset-0 w-full h-full overflow-visible" preserveAspectRatio="none" viewBox="0 0 100 100">
                                <path d="M0,20 L20,30 L40,45 L50,45 L60,10 L80,25 L100,40" fill="none" stroke="#22c55e" stroke-width="2" vector-effect="non-scaling-stroke" stroke-linejoin="round"/>
                                <path d="M40,45 L50,45 L60,10" fill="none" stroke="#22c55e" stroke-width="4" stroke-dasharray="4,4" vector-effect="non-scaling-stroke"/>
                            </svg>
                            <svg class="absolute inset-0 w-full h-full overflow-visible" preserveAspectRatio="none" viewBox="0 0 100 100">
                                <path d="M0,40 L20,45 L40,55 L50,55 L60,30 L80,40 L100,50" fill="none" stroke="#ea580c" stroke-width="2" vector-effect="non-scaling-stroke" stroke-linejoin="round" opacity="0.6"/>
                            </svg>
                        </div>
                        
                        <div class="absolute left-10 right-10 bottom-0 flex justify-between text-xs text-gray-400 font-mono">
                            <span>08:00</span><span>12:00</span><span>16:00</span>
                        </div>
                    </div>

                    <div class="flex items-center justify-center gap-6 p-4 bg-gray-50 rounded-2xl border border-gray-100">
                        <div class="flex items-center gap-2">
                            <div class="w-3 h-3 rounded-full bg-green-500"></div>
                            <span class="text-sm font-medium text-gray-700">Battery %</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <div class="w-3 h-3 rounded-full bg-orange-600 opacity-60"></div>
                            <span class="text-sm font-medium text-gray-700">Voltage</span>
                        </div>
                    </div>
                </div>
            </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
