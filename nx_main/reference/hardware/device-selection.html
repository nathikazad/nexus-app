<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Device selection — Nexus App UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-100 p-4 md:p-8 font-sans text-gray-900 antialiased selection:bg-orange-100 selection:text-orange-900">

    <div class="flex flex-wrap justify-center gap-10 items-start">
            <div class="relative w-full max-w-[375px] h-[812px] bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border-[6px] border-gray-900 flex flex-col">
                <div class="px-5 pt-14 pb-4 flex items-center justify-between border-b border-gray-100 bg-white z-10">
                    <a href="no-hardware.html" class="w-10 h-10 -ml-2 rounded-full flex items-center justify-center text-gray-900 hover:bg-gray-50" title="Back">
                        <i data-lucide="arrow-left" class="w-5 h-5" stroke-width="1.5"></i>
                    </a>
                    <button class="text-gray-900 w-10 h-10 -mr-2 rounded-full flex items-center justify-center hover:bg-gray-50">
                        <i data-lucide="refresh-cw" class="w-5 h-5" stroke-width="1.5"></i>
                    </button>
                </div>
                
                <div class="p-6">
                    <h1 class="text-2xl font-medium tracking-tight text-gray-900 mb-2">Select Nexus device</h1>
                    <p class="text-base text-gray-500 mb-6 leading-relaxed">Choose the physical unit for this phone. Only this device will connect.</p>

                    <div class="space-y-3">
                        <a href="hardware.html" class="w-full flex items-center p-4 rounded-2xl border-2 border-orange-600 bg-orange-50 text-left transition-all no-underline text-inherit" title="Open hardware when connected">
                            <div class="w-10 h-10 rounded-full bg-orange-100 flex items-center justify-center text-orange-600 mr-4">
                                <i data-lucide="loader-2" class="w-5 h-5 animate-spin" stroke-width="1.5"></i>
                            </div>
                            <div class="flex-1">
                                <h3 class="text-base font-medium text-gray-900">NX-Necklace-Beta</h3>
                            </div>
                            <span class="text-sm font-medium text-orange-600">Connecting...</span>
                        </a>

                        <a href="hardware.html" class="w-full flex items-center p-4 rounded-2xl border border-gray-200 hover:border-gray-300 bg-white text-left transition-all no-underline text-inherit">
                            <div class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center text-gray-600 mr-4">
                                <i data-lucide="bluetooth" class="w-5 h-5" stroke-width="1.5"></i>
                            </div>
                            <div class="flex-1">
                                <h3 class="text-base font-medium text-gray-900">Nexus-Dev-Unit-4</h3>
                            </div>
                            <span class="text-sm text-gray-400 flex items-center gap-1"><i data-lucide="signal" class="w-3.5 h-3.5" stroke-width="1.5"></i> -68 dBm</span>
                        </a>
                        
                        <a href="hardware.html" class="w-full flex items-center p-4 rounded-2xl border border-gray-200 hover:border-gray-300 bg-white text-left transition-all no-underline text-inherit">
                            <div class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center text-gray-600 mr-4">
                                <i data-lucide="bluetooth" class="w-5 h-5" stroke-width="1.5"></i>
                            </div>
                            <div class="flex-1">
                                <h3 class="text-base font-medium text-gray-900">Unknown Device</h3>
                            </div>
                            <span class="text-sm text-gray-400 flex items-center gap-1"><i data-lucide="signal" class="w-3.5 h-3.5" stroke-width="1.5"></i> -82 dBm</span>
                        </a>
                    </div>
                </div>
            </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
