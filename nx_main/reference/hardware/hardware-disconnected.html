<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hardware — Disconnected — Nexus App UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-100 p-4 md:p-8 font-sans text-gray-900 antialiased selection:bg-orange-100 selection:text-orange-900">

    <div class="flex flex-wrap justify-center gap-10 items-start">
            <div class="relative w-full max-w-[375px] h-[812px] bg-gray-50 rounded-[2.5rem] shadow-2xl overflow-hidden border-[6px] border-gray-900 flex flex-col">
                <!-- Top bar -->
                <div class="bg-white px-5 pt-14 pb-3 flex items-center justify-between border-b border-gray-100 z-10 sticky top-0">
                    <h1 class="text-xl font-medium tracking-tight text-gray-900">Nexus</h1>
                    <a href="hardware-menu-panel.html" class="w-10 h-10 -mr-1 rounded-xl flex items-center justify-center text-gray-600 hover:bg-gray-100 transition-colors no-underline" title="Menu">
                        <i data-lucide="menu" class="w-6 h-6" stroke-width="1.5"></i>
                    </a>
                </div>

                <!-- Main content — disconnected state -->
                <div class="flex-1 overflow-y-auto no-scrollbar p-5 pb-24 space-y-4">
                    <!-- Device card — shows remembered device, not connected -->
                    <div class="w-full bg-white rounded-2xl p-4 border border-gray-100 shadow-sm">
                        <div class="flex items-start justify-between">
                            <div class="flex items-center gap-3">
                                <div class="w-11 h-11 rounded-full bg-gray-100 flex items-center justify-center" aria-hidden="true">
                                    <svg viewBox="0 0 24 24" class="w-6 h-6 shrink-0" fill="none" aria-hidden="true">
                                        <path d="M5 6.5h14L12 18.2 5 6.5z" fill="#9ca3af"/>
                                    </svg>
                                </div>
                                <div>
                                    <h2 class="text-base font-medium text-gray-900">NX-Necklace-Beta</h2>
                                </div>
                            </div>
                            <span class="inline-flex items-center gap-1 text-sm text-gray-400">
                                <i data-lucide="wifi-off" class="w-3.5 h-3.5" stroke-width="1.5"></i>
                                Offline
                            </span>
                        </div>
                    </div>

                    <!-- Connect / Forget actions -->
                    <div class="pt-2 space-y-3">
                        <a href="hardware.html" class="flex items-center justify-center gap-2 w-full bg-orange-600 text-white text-base font-medium py-3 rounded-xl shadow-md shadow-orange-600/20 hover:bg-orange-700 transition-colors no-underline">
                            <i data-lucide="bluetooth" class="w-5 h-5" stroke-width="1.5"></i>
                            Connect
                        </a>
                        <a href="no-hardware.html" class="flex items-center justify-center gap-2 w-full bg-white text-gray-600 text-base font-medium py-3 rounded-xl border border-gray-200 hover:bg-gray-50 transition-colors no-underline">
                            Forget Device
                        </a>
                    </div>
                </div>

                <!-- Bottom nav bar -->
                <div class="bg-white border-t border-gray-100 pb-8 pt-3 px-6 flex justify-between items-center z-10 sticky bottom-0">
                    <a href="hardware-disconnected.html" class="flex flex-col items-center gap-1 text-orange-600 no-underline"><i data-lucide="cpu" class="w-6 h-6" stroke-width="1.5"></i><span class="text-xs font-medium">Hardware</span></a>
                    <a href="../navigator/model-types.html" class="flex flex-col items-center gap-1 text-gray-400 hover:text-gray-600 no-underline"><i data-lucide="layout-grid" class="w-6 h-6" stroke-width="1.5"></i><span class="text-xs font-medium">Navigator</span></a>
                    <a href="../logs/log-viewer.html" class="flex flex-col items-center gap-1 text-gray-400 hover:text-gray-600 no-underline"><i data-lucide="terminal-square" class="w-6 h-6" stroke-width="1.5"></i><span class="text-xs font-medium">Logs</span></a>
                    <a href="../data/data-home.html" class="flex flex-col items-center gap-1 text-gray-400 hover:text-gray-600 no-underline"><i data-lucide="database" class="w-6 h-6" stroke-width="1.5"></i><span class="text-xs font-medium">Data</span></a>
                </div>
            </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
