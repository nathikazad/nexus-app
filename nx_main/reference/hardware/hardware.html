<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hardware — Nexus App UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-100 p-4 md:p-8 font-sans text-gray-900 antialiased selection:bg-orange-100 selection:text-orange-900">

    <div class="flex flex-wrap justify-center gap-10 items-start">
            <div class="relative w-full max-w-[375px] h-[812px] bg-gray-50 rounded-[2.5rem] shadow-2xl overflow-hidden border-[6px] border-gray-900 flex flex-col">
                <div class="bg-white px-5 pt-14 pb-3 flex items-center justify-between border-b border-gray-100 z-10 sticky top-0">
                    <h1 class="text-xl font-medium tracking-tight text-gray-900">Nexus</h1>
                    <button id="hw-menu-btn" class="w-10 h-10 -mr-1 rounded-xl flex items-center justify-center text-gray-600 hover:bg-gray-100 transition-colors" title="Menu">
                        <i data-lucide="menu" class="w-6 h-6" stroke-width="1.5"></i>
                    </button>
                </div>

                <!-- Menu popup -->
                <div id="hw-menu-scrim" class="hidden absolute inset-0 z-[80]" aria-hidden="true"></div>
                <div id="hw-menu-popup" class="hidden absolute right-7 top-[4.5rem] z-[90] bg-white rounded-xl shadow-lg border border-gray-100 py-1 min-w-[160px]">
                    <a href="preferences.html" class="flex items-center gap-3 px-4 py-3 no-underline text-inherit hover:bg-gray-50 transition-colors">
                        <i data-lucide="settings" class="w-[18px] h-[18px] text-gray-500" stroke-width="1.75"></i>
                        <span class="text-sm font-medium text-gray-900">Preferences</span>
                    </a>
                    <div class="h-px bg-gray-100 mx-3"></div>
                    <a href="../auth/login.html" class="flex items-center gap-3 px-4 py-3 no-underline text-inherit hover:bg-gray-50 transition-colors">
                        <i data-lucide="log-out" class="w-[18px] h-[18px] text-gray-500" stroke-width="1.75"></i>
                        <span class="text-sm font-medium text-gray-900">Log out</span>
                    </a>
                </div>

                <div class="flex-1 overflow-y-auto no-scrollbar p-5 pb-24 space-y-4">
                    <button type="button" id="hw-device-card" class="w-full bg-white rounded-2xl p-4 border border-gray-100 shadow-sm text-left cursor-pointer active:bg-gray-50/80 transition-colors hover:border-gray-200">
                        <div class="flex items-center justify-between">
                            <div class="flex items-center gap-3">
                                <div class="w-11 h-11 rounded-full bg-orange-50 flex items-center justify-center" aria-hidden="true">
                                    <!-- Wearable: triangle, point down (▽); black fill on orange tint circle -->
                                    <svg viewBox="0 0 24 24" class="w-6 h-6 shrink-0" fill="none" aria-hidden="true">
                                        <path d="M5 6.5h14L12 18.2 5 6.5z" fill="#171717"/>
                                    </svg>
                                </div>
                                <div>
                                    <h2 class="text-base font-medium text-gray-900">NX-Necklace-Beta</h2>
                                </div>
                            </div>
                            <span class="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center text-gray-600 pointer-events-none shrink-0" aria-hidden="true"><i data-lucide="vibrate" class="w-4 h-4" stroke-width="1.5"></i></span>
                        </div>
                    </button>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-white rounded-2xl p-4 border border-gray-100 shadow-sm flex flex-col justify-between">
                            <div class="flex items-center justify-between mb-2">
                                <span class="text-sm text-gray-500">Battery</span>
                                <i data-lucide="zap" class="w-4 h-4 text-green-500" stroke-width="1.5"></i>
                            </div>
                            <div class="flex items-baseline gap-1">
                                <span class="text-3xl font-medium tracking-tight text-gray-900">84</span>
                                <span class="text-base text-gray-500">%</span>
                            </div>
                        </div>
                        <div class="bg-white rounded-2xl p-4 border border-gray-100 shadow-sm flex flex-col justify-between">
                            <div class="flex items-center justify-between mb-2">
                                <span class="text-sm text-gray-500">Voltage</span>
                                <i data-lucide="activity" class="w-4 h-4 text-gray-400" stroke-width="1.5"></i>
                            </div>
                            <div class="flex items-baseline gap-1">
                                <span class="text-3xl font-medium tracking-tight text-gray-900">3.92</span>
                                <span class="text-base text-gray-500">v</span>
                            </div>
                        </div>
                    </div>

                    <div class="bg-white rounded-2xl p-4 border border-gray-100 shadow-sm flex items-center justify-between">
                        <div>
                            <span class="block text-sm text-gray-500 mb-0.5">Device Clock (RTC)</span>
                            <span class="block text-base font-medium text-gray-900">Oct 24, 14:32 PST</span>
                        </div>
                        <button class="w-10 h-10 rounded-xl bg-orange-50 text-orange-600 flex items-center justify-center">
                            <i data-lucide="refresh-ccw" class="w-5 h-5" stroke-width="1.5"></i>
                        </button>
                    </div>

                    <div
                        id="hw-camera-card"
                        role="button"
                        tabindex="0"
                        aria-expanded="false"
                        aria-controls="hw-camera-advanced"
                        class="bg-white rounded-2xl p-5 border border-gray-100 shadow-sm cursor-pointer hover:border-gray-200 hover:bg-gray-50/40 transition-colors select-none outline-none focus-visible:ring-2 focus-visible:ring-orange-600/30 focus-visible:ring-offset-2"
                    >
                        <div class="flex items-center justify-between">
                            <div>
                                <h3 class="text-base font-medium text-gray-900">Camera</h3>
                                <p class="text-sm text-gray-500">Auto · 60s</p>
                            </div>
                            <div class="w-12 h-12 rounded-full bg-orange-600 flex items-center justify-center shadow-md shadow-orange-600/20 text-white shrink-0" aria-hidden="true">
                                <i data-lucide="camera" class="w-5 h-5" stroke-width="1.5"></i>
                            </div>
                        </div>
                        <div id="hw-camera-advanced" class="hidden space-y-5 pt-5">
                            <div class="h-px bg-gray-100 w-full"></div>
                            <div class="flex items-center justify-between" data-hw-camera-control>
                                <span class="text-base text-gray-700">Auto Recording</span>
                                <label class="relative inline-flex items-center cursor-pointer">
                                    <input type="checkbox" value="" class="sr-only peer" checked>
                                    <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-orange-600"></div>
                                </label>
                            </div>
                            <div class="flex items-center justify-between" data-hw-camera-control>
                                <span class="text-base text-gray-700">Interval</span>
                                <div class="relative">
                                    <select class="bg-gray-50 border border-gray-200 rounded-lg pl-3 pr-8 py-1.5 text-base text-gray-900 appearance-none focus:outline-none focus:ring-1 focus:ring-orange-600">
                                        <option>30 sec</option>
                                        <option selected>60 sec</option>
                                        <option>5 min</option>
                                    </select>
                                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-500">
                                        <i data-lucide="chevron-down" class="w-4 h-4" stroke-width="1.5"></i>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Device actions bottom sheet -->
                <div id="hw-device-sheet-backdrop" class="hidden absolute inset-0 bg-black/40 z-[60]" aria-hidden="true"></div>
                <div id="hw-device-sheet" class="hidden absolute bottom-0 left-0 right-0 z-[70] px-3 pb-3 max-w-[375px] mx-auto w-full pointer-events-none">
                    <div class="pointer-events-auto bg-white rounded-2xl shadow-2xl border border-gray-100 px-4 pt-3 pb-5">
                        <div class="w-10 h-1 bg-gray-200 rounded-full mx-auto mb-4"></div>
                        <div class="flex flex-col gap-2">
                            <button type="button" id="hw-edit-name-btn" class="w-full py-3 rounded-xl border border-gray-200 text-sm font-medium text-gray-900 hover:bg-gray-50 bg-white">Edit Name</button>
                            <button type="button" id="hw-restart-btn" class="w-full py-3 rounded-xl border border-gray-200 text-sm font-medium text-gray-900 hover:bg-gray-50 bg-white">Restart</button>
                            <a href="no-hardware.html" id="hw-forget-btn" class="block w-full py-3 rounded-xl border border-gray-200 text-sm font-medium text-gray-900 hover:bg-gray-50 bg-white text-center no-underline">Forget</a>
                            <a href="hardware-disconnected.html" id="hw-disconnect-btn" class="block w-full py-3 rounded-xl bg-gray-900 text-white text-sm font-medium hover:bg-gray-800 text-center no-underline">Disconnect</a>
                        </div>
                    </div>
                </div>

                <div class="bg-white border-t border-gray-100 pb-8 pt-3 px-6 flex justify-between items-center z-10 sticky bottom-0">
                    <a href="hardware.html" class="flex flex-col items-center gap-1 text-orange-600 no-underline"><i data-lucide="cpu" class="w-6 h-6" stroke-width="1.5"></i><span class="text-xs font-medium">Hardware</span></a>
                    <a href="../navigator/model-types.html" class="flex flex-col items-center gap-1 text-gray-400 hover:text-gray-600 no-underline"><i data-lucide="layout-grid" class="w-6 h-6" stroke-width="1.5"></i><span class="text-xs font-medium">Navigator</span></a>
                    <a href="../logs/log-viewer.html" class="flex flex-col items-center gap-1 text-gray-400 hover:text-gray-600 no-underline"><i data-lucide="terminal-square" class="w-6 h-6" stroke-width="1.5"></i><span class="text-xs font-medium">Logs</span></a>
                    <a href="../data/data-home.html" class="flex flex-col items-center gap-1 text-gray-400 hover:text-gray-600 no-underline"><i data-lucide="database" class="w-6 h-6" stroke-width="1.5"></i><span class="text-xs font-medium">Data</span></a>
                </div>
            </div>
    </div>

    <script>
        lucide.createIcons();

        (function () {
            var menuBtn = document.getElementById('hw-menu-btn');
            var menuPopup = document.getElementById('hw-menu-popup');
            var menuScrim = document.getElementById('hw-menu-scrim');

            function toggleMenu() {
                menuPopup.classList.toggle('hidden');
                menuScrim.classList.toggle('hidden');
            }
            if (menuBtn) menuBtn.addEventListener('click', toggleMenu);
            if (menuScrim) menuScrim.addEventListener('click', toggleMenu);

            var card = document.getElementById('hw-device-card');
            var sheet = document.getElementById('hw-device-sheet');
            var backdrop = document.getElementById('hw-device-sheet-backdrop');
            var camCard = document.getElementById('hw-camera-card');
            var camAdvanced = document.getElementById('hw-camera-advanced');

            function openDeviceSheet() {
                sheet.classList.remove('hidden');
                backdrop.classList.remove('hidden');
            }
            function closeDeviceSheet() {
                sheet.classList.add('hidden');
                backdrop.classList.add('hidden');
            }

            if (card) card.addEventListener('click', openDeviceSheet);
            if (backdrop) backdrop.addEventListener('click', closeDeviceSheet);
            ['hw-edit-name-btn', 'hw-restart-btn', 'hw-forget-btn', 'hw-disconnect-btn'].forEach(function (id) {
                document.getElementById(id)?.addEventListener('click', closeDeviceSheet);
            });

            function toggleCameraAdvanced() {
                if (!camAdvanced || !camCard) return;
                camAdvanced.classList.toggle('hidden');
                camCard.setAttribute('aria-expanded', String(!camAdvanced.classList.contains('hidden')));
            }

            if (camCard && camAdvanced) {
                camCard.addEventListener('click', function (e) {
                    if (e.target.closest('[data-hw-camera-control]')) return;
                    toggleCameraAdvanced();
                });
                camCard.addEventListener('keydown', function (e) {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        if (e.target.closest('[data-hw-camera-control]')) return;
                        toggleCameraAdvanced();
                    }
                });
            }
        })();
    </script>
</body>
</html>
