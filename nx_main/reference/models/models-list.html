<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wearable devices (list) — Nexus App UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-100 p-4 md:p-8 font-sans text-gray-900 antialiased selection:bg-orange-100 selection:text-orange-900">

    <div class="flex flex-wrap justify-center gap-10 items-start">
            <div class="relative w-full max-w-[375px] h-[812px] bg-gray-50 rounded-[2.5rem] shadow-2xl overflow-hidden border-[6px] border-gray-900 flex flex-col">
                <div class="bg-white px-4 pt-14 pb-3 flex items-center justify-between border-b border-gray-100 z-10">
                    <div class="flex items-center gap-2">
                        <a href="../navigator/model-types.html" class="w-10 h-10 -ml-2 rounded-full flex items-center justify-center text-gray-900 hover:bg-gray-50" title="Back to Model Types">
                            <i data-lucide="arrow-left" class="w-5 h-5" stroke-width="1.5"></i>
                        </a>
                        <h1 class="text-xl font-medium tracking-tight text-gray-900">Wearable Devices</h1>
                    </div>
                    <button class="w-10 h-10 -mr-2 rounded-full flex items-center justify-center text-gray-900 hover:bg-gray-50">
                        <i data-lucide="search" class="w-5 h-5" stroke-width="1.5"></i>
                    </button>
                </div>

                <div class="flex-1 overflow-y-auto no-scrollbar p-4 space-y-3">
                    <a href="model-detail.html" class="block w-full bg-white p-4 rounded-2xl border border-gray-200 text-left hover:border-orange-600 transition-colors shadow-sm no-underline text-inherit">
                        <h3 class="text-base font-medium text-gray-900 mb-1">NX-Beta-1</h3>
                        <p class="text-sm text-gray-500 line-clamp-2">First run beta unit assigned to engineering team.</p>
                        <div class="mt-3 flex items-center gap-3 text-xs text-gray-400">
                            <span class="flex items-center gap-1"><i data-lucide="clock" class="w-3.5 h-3.5" stroke-width="1.5"></i> 2d ago</span>
                        </div>
                    </a>

                    <a href="model-detail.html" class="block w-full bg-white p-4 rounded-2xl border border-gray-200 text-left hover:border-orange-600 transition-colors shadow-sm no-underline text-inherit">
                        <h3 class="text-base font-medium text-gray-900 mb-1">NX-Beta-2</h3>
                        <p class="text-sm text-gray-500 line-clamp-2">Testing new sensor payload. Assigned to QA.</p>
                        <div class="mt-3 flex items-center gap-3 text-xs text-gray-400">
                            <span class="flex items-center gap-1"><i data-lucide="clock" class="w-3.5 h-3.5" stroke-width="1.5"></i> 5h ago</span>
                        </div>
                    </a>
                </div>

                <div class="p-5 bg-white border-t border-gray-100 pb-8">
                    <a href="model-detail.html" class="w-full bg-gray-900 text-white rounded-xl py-3.5 px-4 flex items-center justify-center gap-2 no-underline hover:bg-gray-800 transition-colors">
                        <i data-lucide="plus" class="w-5 h-5" stroke-width="1.5"></i>
                        <span class="text-base font-medium">Create New</span>
                    </a>
                </div>
            </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
