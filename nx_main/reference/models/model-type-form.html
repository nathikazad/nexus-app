<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create model type — Nexus App UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-100 p-4 md:p-8 font-sans text-gray-900 antialiased selection:bg-orange-100 selection:text-orange-900">

    <div class="flex flex-wrap justify-center gap-10 items-start">
            <div class="relative w-full max-w-[375px] h-[812px] bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border-[6px] border-gray-900 flex flex-col">
                <div class="px-4 pt-14 pb-3 flex items-center gap-3 border-b border-gray-100 z-10 sticky top-0 bg-white">
                    <a href="../navigator/model-types-fab-expanded.html" class="w-10 h-10 -ml-2 rounded-full flex items-center justify-center text-gray-900 hover:bg-gray-50" title="Close">
                        <i data-lucide="x" class="w-5 h-5" stroke-width="1.5"></i>
                    </a>
                    <h1 class="text-xl font-medium tracking-tight text-gray-900">Create Model Type</h1>
                </div>

                <div class="flex-1 overflow-y-auto no-scrollbar p-5 space-y-8 pb-28">
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1.5">Name</label>
                            <input type="text" placeholder="e.g. Device" class="w-full bg-white border border-gray-200 rounded-xl px-4 py-3 text-base text-gray-900 focus:outline-none focus:ring-2 focus:ring-orange-600/20 focus:border-orange-600">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1.5">Description (Optional)</label>
                            <textarea rows="2" class="w-full bg-white border border-gray-200 rounded-xl px-4 py-3 text-base text-gray-900 focus:outline-none focus:ring-2 focus:ring-orange-600/20 focus:border-orange-600 resize-none"></textarea>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1.5">Parent Type</label>
                            <a href="parent-type-picker.html" class="w-full flex items-center justify-between px-4 py-3 bg-white border border-gray-200 rounded-xl text-left text-base text-gray-500 hover:bg-gray-50 no-underline">
                                <span>Select parent...</span>
                                <i data-lucide="chevron-right" class="w-5 h-5 text-gray-400" stroke-width="1.5"></i>
                            </a>
                        </div>
                    </div>

                    <div class="h-px bg-gray-100 w-full"></div>

                    <div>
                        <div class="flex items-center justify-between mb-3">
                            <h3 class="text-base font-medium text-gray-900">Attributes</h3>
                            <button class="text-sm font-medium text-orange-600 flex items-center gap-1"><i data-lucide="plus" class="w-4 h-4" stroke-width="1.5"></i> Add</button>
                        </div>
                        <div class="space-y-3">
                            <div class="flex items-center gap-2">
                                <input type="text" value="mac_address" class="flex-1 bg-white border border-gray-200 rounded-lg px-3 py-2 text-sm text-gray-900 focus:outline-none focus:border-orange-600">
                                <select class="w-28 bg-white border border-gray-200 rounded-lg px-2 py-2 text-sm text-gray-900 appearance-none focus:outline-none focus:border-orange-600 text-center">
                                    <option>String</option>
                                    <option>Number</option>
                                </select>
                                <button class="p-2 text-gray-400 hover:text-red-600"><i data-lucide="trash-2" class="w-4 h-4" stroke-width="1.5"></i></button>
                            </div>
                        </div>
                    </div>

                    <div>
                        <div class="flex items-center justify-between mb-3">
                            <h3 class="text-base font-medium text-gray-900">Relationships</h3>
                            <button class="text-sm font-medium text-orange-600 flex items-center gap-1"><i data-lucide="plus" class="w-4 h-4" stroke-width="1.5"></i> Add</button>
                        </div>
                        <div class="p-4 bg-gray-50 rounded-xl border border-gray-200 text-center border-dashed">
                            <p class="text-sm text-gray-500">No relationships defined.</p>
                        </div>
                    </div>
                </div>

                <div class="bg-white border-t border-gray-100 p-5 pb-8 absolute bottom-0 w-full z-10">
                    <a href="../navigator/model-types-fab-expanded.html" class="w-full bg-orange-600 text-white rounded-xl py-3.5 px-4 flex items-center justify-center font-medium text-base shadow-sm no-underline hover:bg-orange-700 transition-colors">
                        Save Model Type
                    </a>
                </div>
            </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
