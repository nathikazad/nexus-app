<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Model detail — Nexus App UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-100 p-4 md:p-8 font-sans text-gray-900 antialiased selection:bg-orange-100 selection:text-orange-900">

    <div class="flex flex-wrap justify-center gap-10 items-start">
            <div class="relative w-full max-w-[375px] h-[812px] bg-gray-50 rounded-[2.5rem] shadow-2xl overflow-hidden border-[6px] border-gray-900 flex flex-col">
                <div class="bg-gray-50 px-4 pt-14 pb-3 flex items-center justify-between z-10 sticky top-0">
                    <a href="models-list.html" class="w-10 h-10 -ml-2 rounded-full flex items-center justify-center text-gray-900 hover:bg-white" title="Back to list">
                        <i data-lucide="arrow-left" class="w-5 h-5" stroke-width="1.5"></i>
                    </a>
                    <div class="flex gap-1">
                        <button class="w-10 h-10 rounded-full flex items-center justify-center text-gray-600 hover:bg-white"><i data-lucide="pencil" class="w-4 h-4" stroke-width="1.5"></i></button>
                        <button class="w-10 h-10 rounded-full flex items-center justify-center text-red-600 hover:bg-red-50"><i data-lucide="trash-2" class="w-4 h-4" stroke-width="1.5"></i></button>
                    </div>
                </div>

                <div class="flex-1 overflow-y-auto no-scrollbar p-5 pt-0">
                    <h1 class="text-3xl font-medium tracking-tight text-gray-900 mb-2 mt-2">NX-Beta-1</h1>
                    <p class="text-base text-gray-600 mb-8 leading-relaxed">First run beta unit assigned to engineering team for field testing in urban environments.</p>

                    <div class="space-y-6">
                        <div>
                            <h3 class="text-sm font-medium text-gray-500 uppercase tracking-wider mb-3 px-1">Attributes</h3>
                            <div class="bg-white rounded-2xl border border-gray-200 overflow-hidden shadow-sm">
                                <div class="px-4 py-3 border-b border-gray-50 flex flex-col">
                                    <span class="text-xs text-gray-400 mb-0.5">Firmware Version</span>
                                    <span class="text-base font-medium text-gray-900">v1.2.4-rc2</span>
                                </div>
                                <div class="px-4 py-3 border-b border-gray-50 flex flex-col">
                                    <span class="text-xs text-gray-400 mb-0.5">MAC Address</span>
                                    <span class="text-base font-mono text-gray-900">a4:c1:38:b2:99</span>
                                </div>
                                <div class="px-4 py-3 flex flex-col">
                                    <span class="text-xs text-gray-400 mb-0.5">Status</span>
                                    <div class="flex items-center gap-1.5 mt-0.5">
                                        <div class="w-2 h-2 rounded-full bg-green-500"></div>
                                        <span class="text-sm font-medium text-gray-900">Active</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div>
                            <h3 class="text-sm font-medium text-gray-500 uppercase tracking-wider mb-3 px-1">Relations • Assigned User</h3>
                            <button class="w-full flex items-center px-4 py-3 bg-white rounded-2xl border border-gray-200 hover:border-gray-300 shadow-sm transition-colors text-left">
                                <div class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center text-gray-600 mr-3">
                                    <i data-lucide="user" class="w-5 h-5" stroke-width="1.5"></i>
                                </div>
                                <div class="flex-1">
                                    <h4 class="text-base font-medium text-gray-900">Alex Chen</h4>
                                    <p class="text-xs text-gray-500">Hardware Engineer</p>
                                </div>
                                <i data-lucide="chevron-right" class="w-5 h-5 text-gray-400" stroke-width="1.5"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
