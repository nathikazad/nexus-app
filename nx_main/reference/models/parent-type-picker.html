<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select parent type — Nexus App UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-100 p-4 md:p-8 font-sans text-gray-900 antialiased selection:bg-orange-100 selection:text-orange-900">

    <div class="flex flex-wrap justify-center gap-10 items-start">
            <div class="relative w-full max-w-[375px] h-[812px] bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border-[6px] border-gray-900 flex flex-col">
                <div class="px-4 pt-14 pb-3 flex items-center gap-3 border-b border-gray-100 z-10 sticky top-0 bg-white">
                    <a href="model-type-form.html" class="w-10 h-10 -ml-2 rounded-full flex items-center justify-center text-gray-900 hover:bg-gray-50" title="Back">
                        <i data-lucide="arrow-left" class="w-5 h-5" stroke-width="1.5"></i>
                    </a>
                    <h1 class="text-xl font-medium tracking-tight text-gray-900">Select Parent Type</h1>
                </div>

                <div class="flex-1 overflow-y-auto no-scrollbar py-2 pb-8">
                    <div class="px-4 py-3 text-sm text-gray-500 border-b border-gray-50">
                        Select a type to inherit its properties.
                    </div>

                    <a href="model-type-form.html" class="flex items-center w-full px-4 py-3.5 hover:bg-gray-50 transition-colors text-left border-b border-gray-50 no-underline text-inherit">
                        <i data-lucide="folder" class="w-5 h-5 text-gray-400 mr-3" stroke-width="1.5"></i>
                        <span class="text-base font-medium text-gray-900 flex-1">Hardware Base</span>
                    </a>
                    
                    <a href="model-type-form.html" class="flex items-center w-full px-4 py-3.5 pl-10 hover:bg-gray-50 transition-colors text-left border-b border-gray-50 bg-gray-50/30 no-underline text-inherit">
                        <div class="w-4 h-px bg-gray-300 mr-2"></div>
                        <i data-lucide="file-box" class="w-4 h-4 text-orange-600 mr-3" stroke-width="1.5"></i>
                        <span class="text-base text-gray-900 flex-1">Wearable Devices</span>
                        <i data-lucide="check" class="w-5 h-5 text-orange-600" stroke-width="1.5"></i>
                    </a>

                    <a href="model-type-form.html" class="flex items-center w-full px-4 py-3.5 pl-10 hover:bg-gray-50 transition-colors text-left border-b border-gray-50 bg-gray-50/30 no-underline text-inherit">
                        <div class="w-4 h-px bg-gray-300 mr-2"></div>
                        <i data-lucide="file-box" class="w-4 h-4 text-gray-400 mr-3" stroke-width="1.5"></i>
                        <span class="text-base text-gray-700 flex-1">Sensors</span>
                    </a>

                    <a href="model-type-form.html" class="flex items-center w-full px-4 py-3.5 hover:bg-gray-50 transition-colors text-left border-b border-gray-50 no-underline text-inherit">
                        <i data-lucide="folder" class="w-5 h-5 text-gray-400 mr-3" stroke-width="1.5"></i>
                        <span class="text-base font-medium text-gray-900 flex-1">Software Base</span>
                    </a>
                </div>
            </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
