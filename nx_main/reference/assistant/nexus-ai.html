<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus AI — Nexus App UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-100 p-4 md:p-8 font-sans text-gray-900 antialiased selection:bg-orange-100 selection:text-orange-900">

    <div class="flex flex-wrap justify-center gap-10 items-start">
            <div class="relative w-full max-w-[375px] h-[812px] bg-gray-50 rounded-[2.5rem] shadow-2xl overflow-hidden border-[6px] border-gray-900 flex flex-col">
                <div class="bg-white px-4 pt-14 pb-3 flex items-center justify-between border-b border-gray-100 z-10 shadow-sm shadow-gray-100/50">
                    <a href="../shell/home-tab-shell.html" class="w-10 h-10 rounded-full flex items-center justify-center text-gray-900 hover:bg-gray-50" title="Close">
                        <i data-lucide="x" class="w-5 h-5" stroke-width="1.5"></i>
                    </a>
                    <div class="flex items-center gap-2">
                        <i data-lucide="sparkles" class="w-4 h-4 text-orange-600" stroke-width="1.5"></i>
                        <h1 class="text-base font-medium tracking-tight text-gray-900">Nexus AI</h1>
                    </div>
                    <button class="w-10 h-10 rounded-full flex items-center justify-center text-gray-400 hover:text-gray-900">
                        <i data-lucide="rotate-ccw" class="w-4 h-4" stroke-width="1.5"></i>
                    </button>
                </div>

                <div class="flex-1 overflow-y-auto no-scrollbar p-5 space-y-6 pb-32">
                    <p class="text-xs text-center text-gray-400 font-medium">Today 14:20</p>
                    
                    <div class="flex justify-end">
                        <div class="bg-gray-200 text-gray-900 rounded-2xl rounded-tr-sm px-4 py-3 max-w-[85%]">
                            <p class="text-base">What was the battery level at noon?</p>
                        </div>
                    </div>

                    <div class="flex justify-start">
                        <div class="w-8 h-8 rounded-full bg-gradient-to-br from-orange-400 to-orange-600 flex items-center justify-center mr-2 flex-shrink-0 mt-1">
                            <i data-lucide="aperture" class="w-4 h-4 text-white" stroke-width="1.5"></i>
                        </div>
                        <div class="bg-white border border-gray-100 shadow-sm text-gray-900 rounded-2xl rounded-tl-sm px-4 py-3 max-w-[80%]">
                            <p class="text-base leading-relaxed">At 12:00 PM today, the necklace battery was at <strong>64%</strong>. It seems to be draining steadily. Would you like me to adjust the camera interval to save power?</p>
                        </div>
                    </div>

                    <div class="flex justify-end">
                        <div class="bg-gray-200 text-gray-900 rounded-2xl rounded-tr-sm px-4 py-3 max-w-[85%]">
                            <p class="text-base">Yes, change it to 5 minutes.</p>
                        </div>
                    </div>

                    <div class="flex justify-start items-center">
                        <div class="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center mr-2 flex-shrink-0">
                            <i data-lucide="aperture" class="w-4 h-4 text-gray-400" stroke-width="1.5"></i>
                        </div>
                        <div class="bg-white border border-gray-100 shadow-sm rounded-2xl rounded-tl-sm px-4 py-3 flex items-center gap-1">
                            <div class="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce"></div>
                            <div class="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0.1s"></div>
                            <div class="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
                        </div>
                    </div>
                </div>

                <div class="absolute bottom-0 w-full bg-white border-t border-gray-100 p-4 pb-8 z-10">
                    <div class="flex items-center gap-3 bg-gray-50 border border-gray-200 rounded-full pl-4 pr-1.5 py-1.5">
                        <input type="text" placeholder="Message Nexus..." class="flex-1 bg-transparent border-none focus:outline-none text-base text-gray-900 placeholder-gray-400">
                        <button class="w-10 h-10 rounded-full bg-orange-600 flex items-center justify-center text-white shrink-0">
                            <i data-lucide="arrow-up" class="w-5 h-5" stroke-width="1.5"></i>
                        </button>
                    </div>
                </div>
            </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
