<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Model types (Navigator) — FAB collapsed — Nexus App UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-100 p-4 md:p-8 font-sans text-gray-900 antialiased selection:bg-orange-100 selection:text-orange-900">

    <div class="flex flex-wrap justify-center gap-10 items-start">
            <div class="relative w-full max-w-[375px] h-[812px] bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border-[6px] border-gray-900 flex flex-col">
                <div class="bg-white px-5 pt-14 pb-3 flex items-center justify-between border-b border-gray-100 z-10 sticky top-0">
                    <h1 class="text-xl font-medium tracking-tight text-gray-900">Model Types</h1>
                    <a href="../auth/login.html" class="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center text-gray-600 hover:bg-gray-100" title="Sign out">
                        <i data-lucide="log-out" class="w-4 h-4" stroke-width="1.5"></i>
                    </a>
                </div>

                <div class="flex-1 overflow-y-auto no-scrollbar py-2 pb-28">
                    <div class="flex items-center w-full px-4 py-3 hover:bg-gray-50 transition-colors">
                        <button class="p-1 mr-1 text-gray-400 hover:text-gray-900"><i data-lucide="chevron-down" class="w-4 h-4" stroke-width="1.5"></i></button>
                        <i data-lucide="folder" class="w-5 h-5 text-orange-500 mr-3" stroke-width="1.5"></i>
                        <span class="text-base font-medium text-gray-900 flex-1">Hardware</span>
                        <button class="p-2 text-gray-400 hover:text-gray-900"><i data-lucide="settings-2" class="w-4 h-4" stroke-width="1.5"></i></button>
                    </div>
                    
                    <a href="../models/models-list.html" class="flex items-center w-full px-4 py-3 pl-10 hover:bg-gray-50 transition-colors bg-gray-50/50 no-underline text-inherit">
                        <div class="w-6 h-px bg-gray-200 mr-2"></div>
                        <i data-lucide="file-box" class="w-4 h-4 text-gray-400 mr-3" stroke-width="1.5"></i>
                        <span class="text-base text-gray-700 flex-1">Wearable Devices</span>
                        <span class="text-xs text-gray-400 bg-white border border-gray-200 px-2 py-0.5 rounded-md mr-3">12</span>
                        <span class="p-2 text-gray-400"><i data-lucide="settings-2" class="w-4 h-4" stroke-width="1.5"></i></span>
                    </a>

                    <div class="flex items-center w-full px-4 py-3 pl-10 hover:bg-gray-50 transition-colors bg-gray-50/50">
                        <div class="w-6 h-px bg-gray-200 mr-2"></div>
                        <i data-lucide="file-box" class="w-4 h-4 text-gray-400 mr-3" stroke-width="1.5"></i>
                        <span class="text-base text-gray-700 flex-1">Sensors</span>
                        <span class="text-xs text-gray-400 bg-white border border-gray-200 px-2 py-0.5 rounded-md mr-3">4</span>
                        <button class="p-2 text-gray-400 hover:text-gray-900"><i data-lucide="settings-2" class="w-4 h-4" stroke-width="1.5"></i></button>
                    </div>

                    <div class="flex items-center w-full px-4 py-3 hover:bg-gray-50 transition-colors mt-1 border-t border-gray-50">
                        <button class="p-1 mr-1 text-gray-400 hover:text-gray-900"><i data-lucide="chevron-right" class="w-4 h-4" stroke-width="1.5"></i></button>
                        <i data-lucide="folder" class="w-5 h-5 text-gray-400 mr-3" stroke-width="1.5"></i>
                        <span class="text-base font-medium text-gray-900 flex-1">Software</span>
                        <button class="p-2 text-gray-400 hover:text-gray-900"><i data-lucide="settings-2" class="w-4 h-4" stroke-width="1.5"></i></button>
                    </div>

                    <div class="flex items-center w-full px-4 py-3 hover:bg-gray-50 transition-colors border-t border-gray-50">
                        <button class="p-1 mr-1 text-gray-400 hover:text-gray-900"><i data-lucide="chevron-right" class="w-4 h-4" stroke-width="1.5"></i></button>
                        <i data-lucide="folder" class="w-5 h-5 text-gray-400 mr-3" stroke-width="1.5"></i>
                        <span class="text-base font-medium text-gray-900 flex-1">Users & Orgs</span>
                        <button class="p-2 text-gray-400 hover:text-gray-900"><i data-lucide="settings-2" class="w-4 h-4" stroke-width="1.5"></i></button>
                    </div>
                </div>

                <!-- Collapsed: single orange FAB (+ only), opens expanded menu -->
                <div class="absolute bottom-24 right-5 z-20">
                    <a href="model-types-fab-expanded.html" class="w-14 h-14 bg-orange-600 rounded-2xl shadow-lg shadow-orange-600/30 flex items-center justify-center text-white transition-colors hover:bg-orange-700 active:bg-orange-800 no-underline" title="Create">
                        <i data-lucide="plus" class="w-6 h-6" stroke-width="1.5"></i>
                    </a>
                </div>

                <div class="bg-white border-t border-gray-100 pb-8 pt-3 px-6 flex justify-between items-center z-10 sticky bottom-0">
                    <a href="../hardware/hardware.html" class="flex flex-col items-center gap-1 text-gray-400 hover:text-gray-600 no-underline"><i data-lucide="cpu" class="w-6 h-6" stroke-width="1.5"></i><span class="text-xs font-medium">Hardware</span></a>
                    <a href="model-types.html" class="flex flex-col items-center gap-1 text-orange-600 no-underline"><i data-lucide="layout-grid" class="w-6 h-6" stroke-width="1.5"></i><span class="text-xs font-medium">Navigator</span></a>
                    <a href="../logs/log-viewer.html" class="flex flex-col items-center gap-1 text-gray-400 hover:text-gray-600 no-underline"><i data-lucide="terminal-square" class="w-6 h-6" stroke-width="1.5"></i><span class="text-xs font-medium">Logs</span></a>
                    <a href="../data/data-home.html" class="flex flex-col items-center gap-1 text-gray-400 hover:text-gray-600 no-underline"><i data-lucide="database" class="w-6 h-6" stroke-width="1.5"></i><span class="text-xs font-medium">Data</span></a>
                </div>
            </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
