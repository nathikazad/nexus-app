<!DOCTYPE html>
<html lang="en">
<head>

    <style>

<body class="bg-gray-100 p-4 md:p-8 font-sans text-gray-900 antialiased selection:bg-orange-100 selection:text-orange-900">

    <div class="flex flex-wrap justify-center gap-10 items-start">

                        <span class="text-sm font-medium text-gray-900">Log out</span>
                    </a>
                </div>

                <!-- Search bar -->

                    <div class="flex items-center bg-gray-100 rounded-xl px-3 py-2.5">

                </div>

                <div class="flex-1 overflow-y-auto no-scrollbar py-2 pb-28">

                    <!-- === Real Nouns (abstract, expanded) === -->

                        <span class="p-1 mr-1 text-gray-400"><i data-lucide="chevron-down" class="w-4 h-4" stroke-width="1.5"></i></span>
                        <i data-lucide="folder" class="w-5 h-5 text-orange-500 mr-3 shrink-0" stroke-width="1.5"></i>
                        <span class="text-base font-medium text-gray-900 flex-1 text-left">Real Nouns</span>
                        <span class="text-xs text-gray-400 bg-gray-100 px-2 py-0.5 rounded-md">abstract</span>
                    </button>
                    <div id="realnouns-children">
                        <a href="model-type-detail.html" class="flex items-center w-full px-4 py-3 pl-10 hover:bg-gray-50 transition-colors no-underline text-inherit">
                            <div class="w-6 h-px bg-gray-200 mr-2"></div>
                            <i data-lucide="box" class="w-4 h-4 text-orange-400 mr-3 shrink-0" stroke-width="1.5"></i>
                            <span class="text-base text-gray-800 flex-1">Person</span>
                            <span class="text-xs text-gray-400 bg-gray-100 px-2 py-0.5 rounded-md">base</span>
                        </a>
                        <a href="model-type-detail.html" class="flex items-center w-full px-4 py-3 pl-10 hover:bg-gray-50 transition-colors no-underline text-inherit">
                            <div class="w-6 h-px bg-gray-200 mr-2"></div>
                            <i data-lucide="box" class="w-4 h-4 text-orange-400 mr-3 shrink-0" stroke-width="1.5"></i>
                            <span class="text-base text-gray-800 flex-1">Company</span>
                            <span class="text-xs text-gray-400 bg-gray-100 px-2 py-0.5 rounded-md">base</span>
                        </a>
                        <a href="model-type-detail.html" class="flex items-center w-full px-4 py-3 pl-10 hover:bg-gray-50 transition-colors no-underline text-inherit">
                            <div class="w-6 h-px bg-gray-200 mr-2"></div>
                            <i data-lucide="box" class="w-4 h-4 text-orange-400 mr-3 shrink-0" stroke-width="1.5"></i>
                            <span class="text-base text-gray-800 flex-1">Place</span>
                            <span class="text-xs text-gray-400 bg-gray-100 px-2 py-0.5 rounded-md">base</span>
                        </a>
                        <a href="model-type-detail.html" class="flex items-center w-full px-4 py-3 pl-10 hover:bg-gray-50 transition-colors no-underline text-inherit">
                            <div class="w-6 h-px bg-gray-200 mr-2"></div>
                            <i data-lucide="box" class="w-4 h-4 text-orange-400 mr-3 shrink-0" stroke-width="1.5"></i>
                            <span class="text-base text-gray-800 flex-1">Product</span>
                            <span class="text-xs text-gray-400 bg-gray-100 px-2 py-0.5 rounded-md">base</span>
                        </a>
                    </div>

                    <!-- === Action (abstract, collapsed) === -->
                    <div class="border-t border-gray-100">
                        <button class="flex items-center w-full px-4 py-3 hover:bg-gray-50 transition-colors" id="action-toggle">
                            <span class="p-1 mr-1 text-gray-400"><i data-lucide="chevron-right" class="w-4 h-4" stroke-width="1.5"></i></span>
                            <i data-lucide="folder" class="w-5 h-5 text-gray-400 mr-3 shrink-0" stroke-width="1.5"></i>
                            <span class="text-base font-medium text-gray-900 flex-1 text-left">Action</span>
                            <span class="text-xs text-gray-400 bg-gray-100 px-2 py-0.5 rounded-md">abstract</span>
                        </button>
                        <div id="action-children" class="hidden">
                            <a href="model-type-detail.html" class="flex items-center w-full px-4 py-3 pl-10 hover:bg-gray-50 transition-colors no-underline text-inherit">
                                <div class="w-6 h-px bg-gray-200 mr-2"></div>
                                <i data-lucide="box" class="w-4 h-4 text-orange-400 mr-3 shrink-0" stroke-width="1.5"></i>
                                <span class="text-base text-gray-800 flex-1">Meet</span>
                                <span class="text-xs text-gray-400 bg-gray-100 px-2 py-0.5 rounded-md">base</span>
                            </a>
                            <a href="model-type-detail.html" class="flex items-center w-full px-4 py-3 pl-10 hover:bg-gray-50 transition-colors no-underline text-inherit">

                            </a>

                    </div>

                    <!-- === Digital Nouns (abstract, collapsed) === -->
                    <div class="border-t border-gray-100">
                        <button class="flex items-center w-full px-4 py-3 hover:bg-gray-50 transition-colors" id="digital-toggle">
                            <span class="p-1 mr-1 text-gray-400"><i data-lucide="chevron-right" class="w-4 h-4" stroke-width="1.5"></i></span>
                            <i data-lucide="folder" class="w-5 h-5 text-gray-400 mr-3 shrink-0" stroke-width="1.5"></i>
                            <span class="text-base font-medium text-gray-900 flex-1 text-left">Digital Nouns</span>
                            <span class="text-xs text-gray-400 bg-gray-100 px-2 py-0.5 rounded-md">abstract</span>
                        </button>
                        <div id="digital-children" class="hidden">
                            <a href="model-type-detail.html" class="flex items-center w-full px-4 py-3 pl-10 hover:bg-gray-50 transition-colors no-underline text-inherit">
                                <div class="w-6 h-px bg-gray-200 mr-2"></div>
                                <i data-lucide="box" class="w-4 h-4 text-orange-400 mr-3 shrink-0" stroke-width="1.5"></i>
                                <span class="text-base text-gray-800 flex-1">Expense</span>
                                <span class="text-xs text-gray-400 bg-gray-100 px-2 py-0.5 rounded-md">base</span>
                            </a>
                            <a href="model-type-detail.html" class="flex items-center w-full px-4 py-3 pl-10 hover:bg-gray-50 transition-colors no-underline text-inherit">
                                <div class="w-6 h-px bg-gray-200 mr-2"></div>
                                <i data-lucide="box" class="w-4 h-4 text-orange-400 mr-3 shrink-0" stroke-width="1.5"></i>
                                <span class="text-base text-gray-800 flex-1">Transfer</span>
                                <span class="text-xs text-gray-400 bg-gray-100 px-2 py-0.5 rounded-md">base</span>
                            </a>
                        </div>
                    </div>
                </div>

                <!-- FAB — just "Create Type" -->
                <div class="absolute bottom-24 right-5 z-20">
                    <a href="../models/model-type-form.html" class="w-14 h-14 bg-orange-600 rounded-2xl shadow-lg shadow-orange-600/30 flex items-center justify-center text-white transition-colors hover:bg-orange-700 active:bg-orange-800 no-underline" title="Create Model Type">
                        <i data-lucide="plus" class="w-6 h-6" stroke-width="1.5"></i>
                    </a>
                </div>

                <div class="bg-white border-t border-gray-100 pb-8 pt-3 px-6 flex justify-between items-center z-10 sticky bottom-0">
                    <a href="../hardware/hardware.html" class="flex flex-col items-center gap-1 text-gray-400 hover:text-gray-600 no-underline"><i data-lucide="cpu" class="w-6 h-6" stroke-width="1.5"></i><span class="text-xs font-medium">Hardware</span></a>
                    <a href="model-types.html" class="flex flex-col items-center gap-1 text-orange-600 no-underline"><i data-lucide="layout-grid" class="w-6 h-6" stroke-width="1.5"></i><span class="text-xs font-medium">Navigator</span></a>
                    <a href="../logs/log-viewer.html" class="flex flex-col items-center gap-1 text-gray-400 hover:text-gray-600 no-underline"><i data-lucide="terminal-square" class="w-6 h-6" stroke-width="1.5"></i><span class="text-xs font-medium">Logs</span></a>
                    <a href="../data/data-home.html" class="flex flex-col items-center gap-1 text-gray-400 hover:text-gray-600 no-underline"><i data-lucide="database" class="w-6 h-6" stroke-width="1.5"></i><span class="text-xs font-medium">Data</span></a>
                </div>
            </div>
    </div>

    <script>
        lucide.createIcons();

        // Menu toggle
        var menuBtn = document.getElementById('nav-menu-btn');
        var menuPopup = document.getElementById('nav-menu-popup');
        var menuScrim = document.getElementById('nav-menu-scrim');
        function toggleMenu() { menuPopup.classList.toggle('hidden'); menuScrim.classList.toggle('hidden'); }
        menuBtn.addEventListener('click', toggleMenu);
        menuScrim.addEventListener('click', toggleMenu);

        // Tree toggles
        function setupToggle(btnId, childrenId) {
            document.getElementById(btnId).addEventListener('click', function() {
                document.getElementById(childrenId).classList.toggle('hidden');
                var icon = this.querySelector('[data-lucide]');
                var current = icon.getAttribute('data-lucide');
                icon.setAttribute('data-lucide', current === 'chevron-right' ? 'chevron-down' : 'chevron-right');
                lucide.createIcons();
            });
        }
        setupToggle('action-toggle', 'action-children');
        setupToggle('digital-toggle', 'digital-children');
    </script>
</body>
</html>
