name: nx_post
description: Personal microblog publisher and public mirror feed preview.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  cupertino_icons: ^1.0.8
  crypto: ^3.0.6
  file_picker: ^10.3.10
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.2
  google_fonts: ^8.0.2
  http: ^1.6.0
  image_picker: ^1.1.2
  intl: ^0.20.2
  nx_db:
    path: ../nx_db

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  shared_preferences: ^2.5.5

flutter:
  uses-material-design: true
